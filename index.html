<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; background:#0a0a0f; }
body { font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif; overflow:hidden; }

.device-shell {
  width:100%; height:100vh; height:100dvh; background:#0a0a0f;
  overflow:hidden; position:relative; display:flex; flex-direction:column;
  padding-top:env(safe-area-inset-top);
}

.screen { flex:1; overflow:hidden; position:relative; display:flex; flex-direction:column; }
.nav-bar { padding:0 20px 12px; display:flex; align-items:center; min-height:52px; flex-shrink:0; z-index:10; }
.nav-back { color:#4da6ff; font-size:15px; cursor:pointer; padding:8px 0; }
.nav-title { flex:1; text-align:center; font-size:17px; font-weight:600; color:#fff; }
.nav-action { color:#4da6ff; font-size:14px; cursor:pointer; }

.scroll { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; }
.scroll::-webkit-scrollbar { display:none; }

.tab-bar {
  background:rgba(8,8,18,0.98); border-top:1px solid rgba(255,255,255,0.08);
  display:flex; align-items:center; padding:0 0 env(safe-area-inset-bottom); flex-shrink:0; backdrop-filter:blur(20px); z-index:50;
}
.tab { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; padding:10px 0 6px; }
.tab-icon { width:24px; height:24px; }
.tab-label { font-size:10px; font-weight:500; }
.tab.active .tab-label { color:#4da6ff; }
.tab.inactive .tab-label { color:#48485a; }

/* ── CARDS ── */
.card { background:#141420; border-radius:20px; border:1px solid rgba(255,255,255,0.07); margin:0 16px 12px; overflow:hidden; }
.card-body { padding:16px 18px; }

.badge { display:inline-flex; align-items:center; gap:4px; padding:4px 10px; border-radius:20px; font-size:11px; font-weight:700; }
.badge-red    { background:rgba(255,75,75,0.15);    color:#ff6b6b; }
.badge-green  { background:rgba(52,211,153,0.15);   color:#34d399; }
.badge-orange { background:rgba(251,146,60,0.15);   color:#fb923c; }
.badge-blue   { background:rgba(77,166,255,0.15);   color:#4da6ff; }
.badge-purple { background:rgba(167,139,250,0.15);  color:#a78bfa; }
.badge-gray   { background:rgba(255,255,255,0.08);  color:#8a8aa2; }

.divider { height:1px; background:rgba(255,255,255,0.06); margin:0 18px; }

.btn-primary  { background:#4da6ff; color:#fff; border:none; border-radius:14px; padding:16px; font-size:16px; font-weight:600; width:100%; cursor:pointer; }
.btn-ghost    { background:rgba(255,255,255,0.06); color:#fff; border:1px solid rgba(255,255,255,0.1); border-radius:14px; padding:14px; font-size:15px; font-weight:600; width:100%; cursor:pointer; }
.btn-secondary{ background:rgba(77,166,255,0.12); color:#4da6ff; border:1px solid rgba(77,166,255,0.25); border-radius:14px; padding:12px; font-size:14px; font-weight:600; cursor:pointer; }

.alert-banner { margin:0 16px 12px; border-radius:16px; padding:14px 16px; display:flex; gap:12px; align-items:flex-start; }
.alert-banner.red    { background:rgba(255,75,75,0.12);   border:1px solid rgba(255,75,75,0.2); }
.alert-banner.orange { background:rgba(251,146,60,0.12);  border:1px solid rgba(251,146,60,0.2); }
.alert-banner.purple { background:rgba(167,139,250,0.1);  border:1px solid rgba(167,139,250,0.2); }
.alert-banner.green  { background:rgba(52,211,153,0.08);  border:1px solid rgba(52,211,153,0.2); }
.alert-icon  { font-size:20px; flex-shrink:0; }
.alert-title { font-size:14px; font-weight:700; }
.alert-body  { font-size:12px; color:#8a8aa2; margin-top:3px; line-height:1.5; }

.modal-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.75); display:flex; align-items:flex-end; z-index:300; backdrop-filter:blur(4px); }
.modal-sheet   { background:#141420; border-radius:24px 24px 0 0; border:1px solid rgba(255,255,255,0.08); padding:12px 20px 40px; width:100%; max-height:80%; overflow-y:auto; }
.modal-handle  { width:36px; height:4px; background:#2a2a3a; border-radius:2px; margin:0 auto 20px; }

.route-code { font-size:36px; font-weight:800; color:#fff; letter-spacing:-1px; }
.amount-glow { font-size:52px; font-weight:800; color:#34d399; text-align:center; padding:8px 0; text-shadow:0 0 40px rgba(52,211,153,0.4); }
.input-field { background:#1e1e30; border:1px solid rgba(255,255,255,0.08); border-radius:12px; padding:14px 16px; color:#fff; font-size:15px; width:100%; outline:none; margin-bottom:10px; }

.comp-step { display:flex; gap:14px; margin-bottom:20px; }
.step-num    { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; flex-shrink:0; margin-top:2px; }
.step-active { background:#4da6ff; color:#fff; }
.step-done   { background:#34d399; color:#fff; }
.step-pending{ background:#1e1e30; color:#5a5a72; border:1px solid #2a2a3a; }
.step-content { flex:1; }
.step-title  { font-size:14px; font-weight:600; color:#fff; }
.step-desc   { font-size:12px; color:#5a5a72; margin-top:3px; line-height:1.5; }

.slide-in { animation:slideIn 0.28s cubic-bezier(0.25,0.46,0.45,0.94) both; }
@keyframes slideIn { from { transform:translateX(30px); opacity:0; } to { transform:translateX(0); opacity:1; } }

/* ── SEARCH BAR ── */
.search-bar {
  margin:0 16px; background:#1a1a2c; border-radius:14px;

.search-bar input::placeholder { color:#3a3a52; }
.search-icon { font-size:16px; color:#3a3a52; flex-shrink:0; }

/* ── SEGMENTED CONTROL ── */
.seg-ctrl { display:flex; background:#141420; border-radius:12px; padding:3px; margin:12px 16px 0; border:1px solid rgba(255,255,255,0.06); }
.seg-btn  { flex:1; border:none; border-radius:10px; padding:8px; font-size:13px; font-weight:600; cursor:pointer; transition:all 0.2s; }
.seg-btn.active   { background:#4da6ff; color:#fff; }
.seg-btn.inactive { background:transparent; color:#5a5a72; }

/* ── FIDS BOARD ── */

.fids-status { width:76px; text-align:right; flex-shrink:0; }

.live-badge { display:flex; align-items:center; gap:5px; font-size:12px; font-weight:700; color:#34d399; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.live-dot { width:7px; height:7px; border-radius:50%; background:#34d399; animation:blink 1.4s ease-in-out infinite; }

/* ── FLIGHT PROGRESS BAR ── */
.fp-track { height:4px; background:#1e1e30; border-radius:2px; position:relative; margin:10px 0 4px; }
.fp-fill  { height:100%; border-radius:2px; position:absolute; left:0; top:0; }
.fp-plane { position:absolute; top:50%; transform:translate(-50%,-50%); font-size:13px; }

/* ── TIMELINE ── */
.timeline { display:flex; justify-content:space-between; align-items:flex-start; padding:0 4px; position:relative; margin:8px 0 4px; }
.timeline::before { content:''; position:absolute; top:11px; left:10%; right:10%; height:1px; background:rgba(255,255,255,0.08); }
.tl-node { display:flex; flex-direction:column; align-items:center; gap:4px; z-index:1; }
.tl-dot  { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.tl-dot-done { background:#34d399; box-shadow:0 0 8px rgba(52,211,153,0.5); }
.tl-dot-active { background:#4da6ff; box-shadow:0 0 8px rgba(77,166,255,0.6); animation:blink 1.4s ease-in-out infinite; }

.tl-time  { font-size:9px; color:#3a3a52; }

.year-bar-fill  { height:100%; border-radius:6px; }

.risk-bar-wrap { width:80px; height:6px; background:#1e1e30; border-radius:3px; overflow:hidden; }
.risk-bar-fill { height:100%; border-radius:3px; }

.globe-wrap { position:absolute; inset:0; overflow:hidden; background:#050510; }
.globe-wrap canvas { display:block; }
.map-card { position:absolute; bottom:0; left:0; right:0; z-index:100; background:linear-gradient(to top, rgba(5,5,16,0.99) 65%, transparent); padding:0 16px 16px; }
.map-card-inner { background:rgba(14,14,28,0.96); border-radius:20px; border:1px solid rgba(255,255,255,0.09); padding:14px 16px; backdrop-filter:blur(20px); }
.map-flight-tabs { display:flex; gap:8px; margin-bottom:10px; }

.map-flight-tab.inactive-tab { background:rgba(255,255,255,0.04); border-color:rgba(255,255,255,0.07); }

.lounge-logo { width:44px; height:44px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
.lounge-footer { padding:0 16px 14px; }
.alt-card { background:#1a1a2a; border-radius:16px; border:1px solid rgba(255,255,255,0.07); margin-bottom:10px; padding:14px 16px; cursor:pointer; }
.alt-card.selected { border-color:#4da6ff; background:rgba(77,166,255,0.06); }
.esim-card { background:#1a1a2a; border-radius:16px; border:1px solid rgba(255,255,255,0.07); margin-bottom:10px; padding:16px; display:flex; align-items:center; gap:14px; cursor:pointer; }

/* ══════════════════════════════════════════════════════════

function greatCircle(fromKey, toKey, steps=80) {
  const a=AIRPORTS_GEO[fromKey], b=AIRPORTS_GEO[toKey];
  if(!a||!b) return [];
  const r=d=>d*Math.PI/180, d2=r=>r*180/Math.PI;
  const [la1,lo1,la2,lo2]=[r(a.lat),r(a.lng),r(b.lat),r(b.lng)];
  const D=2*Math.asin(Math.sqrt(Math.pow(Math.sin((la2-la1)/2),2)+Math.cos(la1)*Math.cos(la2)*Math.pow(Math.sin((lo2-lo1)/2),2)));
  if(D===0) return [[a.lat,a.lng]];
  return Array.from({length:steps+1},(_,i)=>{
    const f=i/steps,A=Math.sin((1-f)*D)/Math.sin(D),B=Math.sin(f*D)/Math.sin(D);
    const x=A*Math.cos(la1)*Math.cos(lo1)+B*Math.cos(la2)*Math.cos(lo2);
    const y=A*Math.cos(la1)*Math.sin(lo1)+B*Math.cos(la2)*Math.sin(lo2);
    const z=A*Math.sin(la1)+B*Math.sin(la2);
    return [d2(Math.atan2(z,Math.sqrt(x*x+y*y))),d2(Math.atan2(y,x))];
  });
}

/* ══════════════════════════════════════════════════════════
   GLOBE SHADER + SUN HELPERS
══════════════════════════════════════════════════════════ */
const DAY_NIGHT_VERT = `
  varying vec3 vWorldNormal;
  varying vec2 vUv;
  void main() {
    vWorldNormal = normalize(mat3(modelMatrix) * normal);
    vUv = uv;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;
const DAY_NIGHT_FRAG = `
  uniform sampler2D dayTex;
  uniform sampler2D nightTex;
  uniform vec3 sunDir;
  varying vec3 vWorldNormal;
  varying vec2 vUv;
  void main() {
    float cosA = dot(normalize(vWorldNormal), normalize(sunDir));
    float blend = smoothstep(-0.12, 0.12, cosA);
    vec4 night = texture2D(nightTex, vUv);
    vec4 day   = texture2D(dayTex,   vUv);
    gl_FragColor = mix(night * 1.1, day, blend);
  }
`;

function calcSunDir(earthGroup) {
  const now = new Date();
  const dayOfYear = (now - new Date(now.getFullYear(), 0, 0)) / 86400000;
  const declRad = -23.45 * Math.cos(2 * Math.PI / 365 * (dayOfYear + 10)) * Math.PI / 180;
  const utcH = now.getUTCHours() + now.getUTCMinutes() / 60 + now.getUTCSeconds() / 3600;
  const sunLng = (12 - utcH) * 15;
  const phi   = Math.PI / 2 - declRad;
  const theta = (sunLng + 180) * Math.PI / 180;
  const obj = new THREE.Vector3(
    -Math.sin(phi) * Math.cos(theta),
     Math.cos(phi),
     Math.sin(phi) * Math.sin(theta)
  );
  return obj.applyEuler(earthGroup.rotation);
}

/* ══════════════════════════════════════════════════════════
   MINI GLOBE (Trips home screen)
══════════════════════════════════════════════════════════ */
const MiniGlobe = ({ flights }) => {
  const mountRef = useRef(null);
  const stateRef = useRef({});

  useEffect(() => {
    const el = mountRef.current;
    if (!el || stateRef.current.renderer) return;
    const W = el.clientWidth || 393;
    const H = 220;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(W, H);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x050510, 1);
    renderer.domElement.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;display:block;';
    el.appendChild(renderer.domElement);

    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, W / H, 0.1, 100);
    camera.position.set(0, 0, 2.6);
    camera.lookAt(0, 0, 0);

    scene.add(new THREE.AmbientLight(0x111122, 0.4));

    const earthGroup = new THREE.Group();
    earthGroup.rotation.y = 0.52;
    scene.add(earthGroup);

    const globeUniforms = {
      dayTex:   { value: null },
      nightTex: { value: null },
      sunDir:   { value: new THREE.Vector3(1, 0, 0) },
    };
    const globeMat = new THREE.ShaderMaterial({
      uniforms: globeUniforms,
      vertexShader: DAY_NIGHT_VERT,
      fragmentShader: DAY_NIGHT_FRAG,
    });
    earthGroup.add(new THREE.Mesh(new THREE.SphereGeometry(1, 48, 48), globeMat));
    stateRef.current.globeUniforms = globeUniforms;
    stateRef.current.earthGroup    = earthGroup;

    const loader = new THREE.TextureLoader();
    loader.load('https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-day.jpg',
      tex => { globeUniforms.dayTex.value = tex; }, undefined, () => {});
    loader.load('https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-night.jpg',
      tex => { globeUniforms.nightTex.value = tex; }, undefined, () => {});

    scene.add(new THREE.Mesh(
      new THREE.SphereGeometry(1.08, 32, 32),
      new THREE.MeshPhongMaterial({ color: 0x4488cc, transparent: true, opacity: 0.08, side: THREE.BackSide })
    ));

    const dotMat  = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const ringMat = new THREE.MeshBasicMaterial({ color: 0x4da6ff, transparent: true, opacity: 0.55, side: THREE.DoubleSide });
    const seenCodes = new Set();
    flights.forEach(fl => {
      [fl.from, fl.to].forEach(code => {
        if (seenCodes.has(code) || !AIRPORTS_GEO[code]) return;
        seenCodes.add(code);
        const pos = latLngToVec3(AIRPORTS_GEO[code].lat, AIRPORTS_GEO[code].lng, 1.012);
        const dot = new THREE.Mesh(new THREE.SphereGeometry(0.013, 8, 8), dotMat.clone());
        dot.position.copy(pos); earthGroup.add(dot);
        const ring = new THREE.Mesh(new THREE.RingGeometry(0.018, 0.030, 16), ringMat.clone());
        ring.position.copy(pos); ring.lookAt(new THREE.Vector3(0,0,0)); earthGroup.add(ring);
      });
    });

    stateRef.current.sweeps = [];
    flights.forEach(fl => {
      const a = AIRPORTS_GEO[fl.from], b = AIRPORTS_GEO[fl.to];
      if (!a || !b) return;
      const pts = buildArc(a, b, 90, 0.22);
      earthGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
        new THREE.LineBasicMaterial({ color: new THREE.Color(fl.color), transparent: true, opacity: fl.status==='cancelled' ? 0.08 : 0.18 })));
      earthGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
        new THREE.LineBasicMaterial({ color: new THREE.Color(fl.color), transparent: true, opacity: fl.status==='cancelled' ? 0.45 : 0.9 })));
      if (fl.status !== 'cancelled') {
        const sweepGeo = new THREE.BufferGeometry().setFromPoints(pts.slice(0, 2));
        const sweep = new THREE.Line(sweepGeo, new THREE.LineBasicMaterial({ color: new THREE.Color(fl.color) }));
        earthGroup.add(sweep);
        stateRef.current.sweeps.push({ sweep, pts, prog: Math.random(), speed: 0.004 });
      }
    });

    let isDragging = false, prevX = 0, prevY = 0, pinchDist = 0;
    stateRef.current.autoSpin = true;

    const onDown = (e) => {
      if (e.touches && e.touches.length === 2) return;
      isDragging = true; stateRef.current.autoSpin = false;
      prevX = e.clientX ?? e.touches?.[0]?.clientX ?? 0;
      prevY = e.clientY ?? e.touches?.[0]?.clientY ?? 0;
    };
    const onMove = (e) => {
      if (e.touches && e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const d  = Math.sqrt(dx*dx + dy*dy);
        if (pinchDist > 0) camera.position.z = Math.max(1.4, Math.min(5, camera.position.z - (d - pinchDist) * 0.012));
        pinchDist = d; return;
      }
      pinchDist = 0;
      if (!isDragging) return;
      const cx = e.clientX ?? e.touches?.[0]?.clientX ?? 0;
      const cy = e.clientY ?? e.touches?.[0]?.clientY ?? 0;
      earthGroup.rotation.y += (cx - prevX) * 0.008;
      prevX = cx; prevY = cy;
    };
    const onUp = () => { isDragging = false; pinchDist = 0; };
    const onWheel = (e) => { e.preventDefault(); camera.position.z = Math.max(1.4, Math.min(5, camera.position.z + e.deltaY * 0.004)); };

    renderer.domElement.addEventListener('mousedown',  onDown);
    renderer.domElement.addEventListener('touchstart', onDown, { passive: true });
    renderer.domElement.addEventListener('wheel',      onWheel, { passive: false });
    window.addEventListener('mousemove',  onMove);
    window.addEventListener('touchmove',  onMove, { passive: true });
    window.addEventListener('mouseup',    onUp);
    window.addEventListener('touchend',   onUp);

    let animId;
    const animate = () => {
      animId = requestAnimationFrame(animate);
      if (stateRef.current.autoSpin) earthGroup.rotation.y += 0.0022;
      if (stateRef.current.globeUniforms) {
        stateRef.current.globeUniforms.sunDir.value.copy(calcSunDir(earthGroup));
      }
      (stateRef.current.sweeps || []).forEach(s => {
        s.prog = (s.prog + s.speed) % 1.1;
        const end = Math.min(Math.floor(s.prog * s.pts.length), s.pts.length - 1);
        const visible = s.pts.slice(0, Math.max(2, end));
        if (visible.length >= 2) { s.sweep.geometry.setFromPoints(visible); s.sweep.geometry.attributes.position.needsUpdate = true; }
      });
      renderer.render(scene, camera);
    };
    animate();

    return () => {
      cancelAnimationFrame(animId);
      renderer.domElement.removeEventListener('mousedown',  onDown);
      renderer.domElement.removeEventListener('touchstart', onDown);
      renderer.domElement.removeEventListener('wheel',      onWheel);
      window.removeEventListener('mousemove',  onMove);
      window.removeEventListener('touchmove',  onMove);
      window.removeEventListener('mouseup',    onUp);
      window.removeEventListener('touchend',   onUp);
      if (el.contains(renderer.domElement)) el.removeChild(renderer.domElement);
      renderer.dispose();
      stateRef.current = {};
    };
  }, []);

  return <div ref={mountRef} style={{position:'relative',width:'100%',height:220,overflow:'hidden',flexShrink:0}}/>;
};

/* ══════════════════════════════════════════════════════════
   ADD FLIGHT MODAL
══════════════════════════════════════════════════════════ */
const AddFlightModal = ({ onClose, onAdd }) => {
  const [query,   setQuery]   = useState("");
  const [date,    setDate]    = useState(new Date().toISOString().slice(0,10));
  const [loading, setLoading] = useState(false);
  const [result,  setResult]  = useState(null);
  const [error,   setError]   = useState(null);

  const search = async () => {
    const callsign = query.replace(/\s/g, '').toUpperCase();
    if (!callsign) return;
    setLoading(true); setError(null); setResult(null);

    // Run OpenSky + AeroDataBox in parallel
    const [liveData, adbData] = await Promise.all([
      openskyLookup(callsign),
      getApiKey() ? adbGet(`/flights/number/${callsign}/${date}`).then(d => Array.isArray(d) ? d[0] : d).catch(() => null) : Promise.resolve(null),
    ]);

    if (!liveData && !adbData) {
      setError("Flight not found. Check the number, date, and make sure your RapidAPI key is set.");
    } else {
      const fl = adbData;
      setResult({
        number:      fl?.number || (liveData?.callsign) || callsign,
        airline:     fl?.airline?.name || null,
        fromCode:    fl?.departure?.airport?.iata || null,
        fromCity:    fl?.departure?.airport?.municipalityName || null,
        toCode:      fl?.arrival?.airport?.iata || null,
        toCity:      fl?.arrival?.airport?.municipalityName || null,
        depTime:     fl ? fmtLocalTime(fl.departure?.scheduledTime?.local || fl.departure?.scheduledTime?.utc) : null,
        arrTime:     fl ? fmtLocalTime(fl.arrival?.scheduledTime?.local   || fl.arrival?.scheduledTime?.utc)   : null,
        status:      fl ? adbStatusToNorm(fl.status) : (liveData && !liveData.onGround ? "active" : "scheduled"),
        altitude:    liveData?.altitude || null,
        speed:       liveData?.speed    || null,
        onGround:    liveData?.onGround ?? null,
        live:        !!liveData,
      });
    }
    setLoading(false);
  };

  const doAdd = () => {
    if (!result) return;
    onAdd({
      number:   result.number,
      date:     date || "Today",
      airline:  result.airline,
      from:     result.fromCode,
      to:       result.toCode,
      depTime:  result.depTime,
      arrTime:  result.arrTime,
      status:   result.status,
      live:     result.live,
    });
    onClose();
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-sheet" onClick={e => e.stopPropagation()}>
        <div className="modal-handle"/>
        <div style={{fontSize:18, fontWeight:700, color:"#fff", marginBottom:16}}>Add Flight</div>
        <div style={{display:"flex", gap:8, marginBottom:10}}>
          <input className="input-field" style={{margin:0, flex:1}} placeholder="Flight number (e.g. LH 441)"
            value={query} onChange={e => setQuery(e.target.value)}
            onKeyDown={e => e.key==='Enter' && search()} autoCapitalize="characters"/>
          <button className="btn-secondary" style={{flexShrink:0, borderRadius:12, padding:"0 16px", cursor:"pointer"}}
            onClick={search} disabled={!query || loading}>{loading ? "…" : "Search"}</button>
        </div>
        <input className="input-field" type="date" value={date} onChange={e => setDate(e.target.value)} style={{marginBottom:14}}/>

        {error && <div style={{color:"#fb923c", fontSize:13, marginBottom:12, lineHeight:1.5}}>{error}</div>}

        {result && (
          <div style={{background:"rgba(77,166,255,0.08)", border:"1px solid rgba(77,166,255,0.2)", borderRadius:14, padding:16, marginBottom:12}}>
            <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10}}>
              <div>
                {result.airline && <div style={{fontSize:11, color:"#5a5a72", marginBottom:3}}>{result.airline}</div>}
                <div style={{fontSize:17, fontWeight:700, color:"#fff"}}>{result.number}</div>
              </div>
              <div style={{display:"flex", gap:6, alignItems:"center"}}>
                {result.live && <div className="live-badge"><div className="live-dot"/><span>LIVE</span></div>}
                <FlightStatusBadge status={result.status}/>
              </div>
            </div>

            {result.fromCode && result.toCode && (
              <div style={{display:"flex", alignItems:"center", marginBottom:10}}>
                <div>
                  <div style={{fontSize:22, fontWeight:800, color:"#fff"}}>{result.fromCode}</div>
                  {result.fromCity && <div style={{fontSize:11, color:"#5a5a72"}}>{result.fromCity}</div>}
                  {result.depTime && <div style={{fontSize:12, fontWeight:600, color:"#fff", marginTop:2}}>{result.depTime}</div>}
                </div>
                <div style={{flex:1, height:1, background:"linear-gradient(90deg,#2a2a3a,#4da6ff,#2a2a3a)", margin:"0 12px"}}/>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:22, fontWeight:800, color:"#fff"}}>{result.toCode}</div>
                  {result.toCity && <div style={{fontSize:11, color:"#5a5a72"}}>{result.toCity}</div>}
                  {result.arrTime && <div style={{fontSize:12, fontWeight:600, color:"#fff", marginTop:2}}>{result.arrTime}</div>}
                </div>
              </div>
            )}

            {result.live && result.altitude && !result.onGround && (
              <div style={{fontSize:13, color:"#8a8aa2", marginBottom:10}}>
                {result.altitude.toLocaleString()} ft · {result.speed} kts
              </div>
            )}

            <button className="btn-primary" onClick={doAdd}>Add to My Trips</button>
          </div>
        )}

        <button className="btn-ghost" onClick={() => { if(query) { onAdd({ number: query.toUpperCase(), date: date || "Upcoming" }); onClose(); } }}
          disabled={!query} style={{opacity: query ? 1 : 0.4, marginTop: result ? 0 : 4}}>
          Add manually without search
        </button>
      </div>
    </div>
  );
};

/* ══════════════════════════════════════════════════════════
   LIVE API HELPERS
══════════════════════════════════════════════════════════ */
const ADB_BASE = 'https://aerodatabox.p.rapidapi.com';
const ADB_HOST = 'aerodatabox.p.rapidapi.com';
function getApiKey()   { return localStorage.getItem('flightapp_key') || ''; }
function saveApiKey(k) { localStorage.setItem('flightapp_key', k); }

async function adbGet(path) {
  const key = getApiKey();
  if (!key) { const e = new Error('NO_KEY'); e.code = 'NO_KEY'; throw e; }
  const res = await fetch(`${ADB_BASE}${path}`, {
    headers: { 'x-rapidapi-host': ADB_HOST, 'x-rapidapi-key': key }
  });
  if (!res.ok) throw new Error(`ADB ${res.status}`);
  return res.json();
}

async function openskyLookup(flightNum) {
  const cs = flightNum.replace(/\s/g,'').toUpperCase();
  try {
    const res = await fetch(`https://opensky-network.org/api/states/all?callsign=${cs}`);
    if (!res.ok) return null;
    const d = await res.json();
    if (!d.states?.length) return null;
    const s = d.states[0];
    return {
      callsign: (s[1]||'').trim(), lat: s[6], lng: s[5],
      altitude: s[7] ? Math.round(s[7]*3.281) : null,
      speed:    s[9] ? Math.round(s[9]*1.944) : null,
      heading:  Math.round(s[10]||0),
      vRate:    s[11] ? Math.round(s[11]*196.85) : 0,
      onGround: s[8],
    };
  } catch { return null; }
}

function fmtUtcTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.getUTCHours().toString().padStart(2,'0') + ':' + d.getUTCMinutes().toString().padStart(2,'0');
}
function fmtLocalTime(iso) {
  if (!iso) return '—';
  // iso like "2024-03-23T19:35+01:00" — extract HH:MM directly
  const m = iso.match(/T(\d{2}:\d{2})/);
  return m ? m[1] : fmtUtcTime(iso);
}
function fmtAdbStatus(raw) {
  if (!raw) return 'Scheduled';
  const m = { EnRoute:'En Route', Landed:'Landed', Arrived:'Arrived', Cancelled:'Cancelled',
    Delayed:'Delayed', Boarding:'Boarding', GateClosed:'Gate Closed', Scheduled:'Scheduled',
    Diverted:'Diverted', Taxiing:'Taxiing', Departed:'Departed' };
  return m[raw] || raw;
}
function adbStatusToNorm(raw) {
  if (!raw) return 'scheduled';
  const s = raw.toLowerCase();
  if (s.includes('enroute')||s.includes('airborne')||s.includes('departed')) return 'active';
  if (s.includes('land')||s.includes('arrived')) return 'landed';
  if (s.includes('cancel')) return 'cancelled';
  if (s.includes('delay')) return 'delayed';
  if (s.includes('boarding')) return 'boarding';
  return 'scheduled';
}

const TrackScreen = ({ onNavigate }) => {
  const [query,        setQuery]        = useState("");
  const [mode,         setMode]         = useState("flights");
  const [loading,      setLoading]      = useState(false);
  const [error,        setError]        = useState(null);
  const [view,         setView]         = useState("search");
  const [flightData,   setFlightData]   = useState(null);
  const [livePos,      setLivePos]      = useState(null);
  const [boardFlights, setBoardFlights] = useState(null);
  const [boardTab,     setBoardTab]     = useState("dep");
  const [apiKey,       setApiKey]       = useState(getApiKey);
  const [keyInput,     setKeyInput]     = useState("");
  const [showKeyModal, setShowKeyModal] = useState(false);

  const reset = () => { setView("search"); setFlightData(null); setLivePos(null); setBoardFlights(null); setError(null); };

  const saveKey = () => { saveApiKey(keyInput.trim()); setApiKey(keyInput.trim()); setShowKeyModal(false); setKeyInput(""); };

  const doFlightSearch = async (num) => {
    const q = (num || query).trim(); if (!q) return;
    setLoading(true); setError(null); setFlightData(null); setLivePos(null);
    const [live] = await Promise.all([openskyLookup(q)]);
    if (live) setLivePos(live);
    if (getApiKey()) {
      try {
        const clean = q.replace(/\s/g,'').toUpperCase();
        const today = new Date().toISOString().slice(0,10);
        const data = await adbGet(`/flights/number/${clean}/${today}`);
        const fl = Array.isArray(data) ? data[0] : data;
        if (fl) { setFlightData(fl); setView("flight"); }
        else setError("Flight not found for today. Check the number or try yesterday.");
      } catch(e) {
        if (e.code === 'NO_KEY') setError("Add your RapidAPI key to see scheduled flight data.");
        else { setError("Couldn't fetch flight data. Check the flight number."); if (live) setView("flight"); }
      }
    } else if (live) {
      setView("flight");
    } else {
      setError("Flight not found in live traffic. Add a RapidAPI key for scheduled data too.");
    }
    setLoading(false);
  };

  const doAirportSearch = async (tab) => {
    const code = query.replace(/\s/g,'').toUpperCase(); if (!code) return;
    const dir = tab || boardTab;
    if (!getApiKey()) { setError("A RapidAPI key is required for airport boards."); return; }
    setLoading(true); setError(null);
    try {
      const now = new Date();
      const from = now.toISOString().slice(0,16);
      const to   = new Date(now.getTime() + 5*3600*1000).toISOString().slice(0,16);
      const direction = dir === 'dep' ? 'Departure' : 'Arrival';
      const data = await adbGet(`/flights/airports/icao/${code}/${from}/${to}?withLeg=true&direction=${direction}&withCancelled=true&withCodeshared=false&withPrivate=false`);
      const items = dir === 'dep' ? (data.departures?.items||[]) : (data.arrivals?.items||[]);
      setBoardFlights(items); setView("airport");
    } catch(e) {
      setError("Airport not found. Use the 4-letter ICAO code — e.g. KJFK · EDDM · EGLL · LEBL");
    }
    setLoading(false);
  };

  const handleGo = () => mode === "flights" ? doFlightSearch() : doAirportSearch();

  // ── Airport FIDS board ─────────────────────────────────
  if (view === "airport") {
    const badgeMap = {active:"badge-green",landed:"badge-green",cancelled:"badge-red",delayed:"badge-orange",boarding:"badge-purple",scheduled:"badge-blue"};
    return (
      <div className="screen slide-in">
        <div className="nav-bar">
          <span className="nav-back" onClick={reset}>‹ Back</span>
          <span className="nav-title">{query.toUpperCase()} · Live Board</span>
        </div>
        <div className="seg-ctrl" style={{margin:"0 16px 8px"}}>
          <button className={`seg-btn ${boardTab==="dep"?"active":"inactive"}`} onClick={()=>{setBoardTab("dep");doAirportSearch("dep");}}>Departures</button>
          <button className={`seg-btn ${boardTab==="arr"?"active":"inactive"}`} onClick={()=>{setBoardTab("arr");doAirportSearch("arr");}}>Arrivals</button>
        </div>
        <div style={{display:"flex",padding:"6px 16px",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
          {["Time","Flight",null,"Gate","Status"].map((h,i)=>(
            <div key={i} style={{fontSize:10,fontWeight:700,color:"#3a3a52",textTransform:"uppercase",letterSpacing:"0.5px",...(i===0?{width:46}:i===1?{width:62}:i===2?{flex:1}:i===3?{width:36,textAlign:"right"}:{width:76,textAlign:"right"})}}>{h||"Destination"}</div>
          ))}
        </div>
        <div className="scroll">
          {loading && <div style={{padding:32,textAlign:"center",color:"#5a5a72"}}>Loading…</div>}
          {!loading && boardFlights?.length === 0 && <div style={{padding:32,textAlign:"center",color:"#5a5a72"}}>No flights in this window.</div>}
          {!loading && boardFlights?.map((f,i) => {
            const other = boardTab==="dep" ? f.arrival?.airport : f.departure?.airport;
            const timeIso = boardTab==="dep" ? (f.departure?.scheduledTime?.local||f.departure?.scheduledTime?.utc) : (f.arrival?.scheduledTime?.local||f.arrival?.scheduledTime?.utc);
            const gate = (boardTab==="dep" ? f.departure?.gate : f.arrival?.gate) || "—";
            const norm = adbStatusToNorm(f.status);
            return (
              <div key={i} className="fids-row" onClick={()=>doFlightSearch(f.number)}>
                <div className="fids-time">{fmtLocalTime(timeIso)}</div>
                <div className="fids-num">{f.number}</div>
                <div className="fids-dest">{other?.iata||"?"} {other?.municipalityName||other?.name||""}</div>
                <div className="fids-gate">{gate}</div>
                <div className="fids-status"><span className={`badge ${badgeMap[norm]||"badge-blue"}`} style={{fontSize:10,padding:"3px 7px"}}>{fmtAdbStatus(f.status)}</span></div>
              </div>
            );
          })}
          <div style={{height:20}}/>
        </div>
      </div>
    );
  }

  // ── Live flight detail ─────────────────────────────────
  if (view === "flight") {
    const fl = flightData;
    const live = livePos;
    const flNum   = fl?.number || live?.callsign || query.toUpperCase();
    const airline = fl?.airline?.name || "";
    const dep = fl?.departure; const arr = fl?.arrival;
    const fromCode = dep?.airport?.iata || "—"; const toCode = arr?.airport?.iata || "—";
    const fromCity = dep?.airport?.municipalityName || dep?.airport?.name || "";
    const toCity   = arr?.airport?.municipalityName || arr?.airport?.name || "";
    const depSched  = fmtLocalTime(dep?.scheduledTime?.local||dep?.scheduledTime?.utc);
    const depActual = dep?.actualTime ? fmtLocalTime(dep.actualTime.local||dep.actualTime.utc) : null;
    const arrSched  = fmtLocalTime(arr?.scheduledTime?.local||arr?.scheduledTime?.utc);
    const delay     = dep?.delay || arr?.delay || 0;
    const status    = fl ? adbStatusToNorm(fl.status) : (live && !live.onGround ? "active" : "scheduled");
    const lineColor = {active:"#34d399",cancelled:"#ff4b4b",delayed:"#fb923c",landed:"#34d399"}[status]||"#4da6ff";
    const aircraft  = fl?.aircraft;

    return (
      <div className="screen slide-in">
        <div className="nav-bar">
          <span className="nav-back" onClick={reset}>‹ Back</span>
          <span className="nav-title">{flNum}</span>
          <span className="nav-action" style={{color:"#34d399",cursor:"pointer",fontSize:13}}>+ Add</span>
        </div>
        <div className="scroll">
          <div className="card">
            <div className="card-body">
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
                <div>
                  <div style={{fontSize:11,color:"#5a5a72",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.5px"}}>{airline||"—"}</div>
                  <div style={{fontSize:18,fontWeight:800,color:"#fff"}}>{flNum}</div>
                </div>
                <FlightStatusBadge status={status}/>
              </div>
              <div style={{display:"flex",alignItems:"center",marginBottom:10}}>
                <div>
                  <div style={{fontSize:28,fontWeight:800,color:"#fff"}}>{fromCode}</div>
                  <div style={{fontSize:11,color:"#5a5a72"}}>{fromCity}</div>
                  <div style={{fontSize:13,fontWeight:600,color:"#fff",marginTop:3}}>
                    {depActual && depActual!==depSched
                      ? <><span style={{textDecoration:"line-through",color:"#5a5a72",marginRight:4}}>{depSched}</span>{depActual}</>
                      : depSched}
                  </div>
                </div>
                <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",padding:"0 12px"}}>
                  {aircraft?.model && <div style={{fontSize:10,color:"#5a5a72",marginBottom:4}}>{aircraft.model}</div>}
                  <div style={{width:"100%",height:1,background:`linear-gradient(90deg,#2a2a3a,${lineColor},#2a2a3a)`}}/>
                  {delay>0 && <div style={{fontSize:10,color:"#fb923c",marginTop:4}}>+{delay} min</div>}
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:28,fontWeight:800,color:"#fff"}}>{toCode}</div>
                  <div style={{fontSize:11,color:"#5a5a72"}}>{toCity}</div>
                  <div style={{fontSize:13,fontWeight:600,color:"#fff",marginTop:3}}>{arrSched}</div>
                </div>
              </div>
            </div>
          </div>

          {live && !live.onGround && (
            <div className="card">
              <div className="card-body">
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
                  <div className="live-dot"/>
                  <span style={{fontSize:12,fontWeight:700,color:"#34d399"}}>LIVE</span>
                  <span style={{fontSize:11,color:"#5a5a72",marginLeft:2}}>via OpenSky Network</span>
                </div>
                <div style={{display:"flex"}}>
                  {[["Altitude",live.altitude?`${numFmt(live.altitude)} ft`:"—"],["Speed",live.speed?`${live.speed} kts`:"—"],["Heading",`${live.heading}°`],["V/S",live.vRate?(live.vRate>0?"+":"")+numFmt(live.vRate)+" fpm":"—"]].map(([k,v])=>(
                    <div key={k} style={{flex:1,textAlign:"center"}}>
                      <div style={{fontSize:15,fontWeight:700,color:"#fff"}}>{v}</div>
                      <div style={{fontSize:10,color:"#5a5a72",marginTop:3}}>{k}</div>

          {live?.onGround && (
            <div className="alert-banner green"><span className="alert-icon">✅</span>
              <div><div className="alert-title" style={{color:"#34d399"}}>On Ground</div><div className="alert-body">Aircraft is currently on the ground.</div></div>
            </div>

          {fl && (
            <div className="card">
              <div className="card-body">
                <div style={{fontSize:11,color:"#5a5a72",textTransform:"uppercase",letterSpacing:"0.6px",marginBottom:12}}>Terminal Info</div>

                  {[["Terminal",dep?.terminal||"—"],["Gate",dep?.gate||"—"],["Aircraft",aircraft?.model?.split(" ").slice(-1)[0]||"—"],["Tail",aircraft?.reg||"—"]].map(([k,v])=>(

    <div className="screen slide-in">

// Convert lat/lng to a point on a unit sphere (Three.js coords)
function latLngToVec3(lat, lng, r) {
  const phi   = (90 - lat) * Math.PI / 180;
  const theta = (lng + 180) * Math.PI / 180;
  return new THREE.Vector3(
    -r * Math.sin(phi) * Math.cos(theta),
     r * Math.cos(phi),
     r * Math.sin(phi) * Math.sin(theta)
  );
}

// Build arc points between two lat/lng pairs with a bow height
function buildArc(fromGeo, toGeo, segments, bowHeight) {
  const pts = [];
  for (let i = 0; i <= segments; i++) {
    const t   = i / segments;
    const lat = fromGeo.lat + (toGeo.lat - fromGeo.lat) * t;
    const lng = fromGeo.lng + (toGeo.lng - fromGeo.lng) * t;
    const h   = 1.0 + bowHeight * Math.sin(Math.PI * t);
    pts.push(latLngToVec3(lat, lng, h));
  }
  return pts;
}

const MapScreen = ({ onNavigate }) => {
  const mountRef = useRef(null);
  const stateRef = useRef({});
  const [active, setActive] = useState(0);

  // When tab changes, nudge the globe to face the route midpoint
  useEffect(() => {
    const eg = stateRef.current.earthGroup;
    if (!eg) return;
    const fl  = MAP_FLIGHTS[active];
    const a   = AIRPORTS_GEO[fl.from];
    const b   = AIRPORTS_GEO[fl.to];
    const midLng = (a.lng + b.lng) / 2;
    // Rotate so the midpoint faces the camera (camera is at +Z)
    // Three.js sphere: lng maps to -rotation.y offset
    eg.rotation.y = (-midLng * Math.PI / 180) + Math.PI;
    eg.rotation.x = (-(a.lat + b.lat) / 2) * Math.PI / 180 * 0.5;
  }, [active]);

  useEffect(() => {
    const el = mountRef.current;
    if (!el || stateRef.current.renderer) return;

    const W = el.clientWidth  || window.innerWidth;
    const H = el.clientHeight || window.innerHeight;

    /* ── Renderer ─────────────────────────────────── */
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(W, H);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x050510, 1);
    // Style the canvas to fill the container
    renderer.domElement.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;display:block;';
    el.appendChild(renderer.domElement);

    /* ── Scene & camera ───────────────────────────── */
    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(42, W / H, 0.1, 100);
    camera.position.set(0, 0, 2.8);
    camera.lookAt(0, 0, 0);

    /* ── Minimal ambient for atmosphere glow only ── */
    scene.add(new THREE.AmbientLight(0x111122, 0.3));

    /* ── Rotating group: globe + arcs + markers ───── */
    // Everything inside rotates together so arcs stay on the surface
    const earthGroup = new THREE.Group();
    // Start oriented so transatlantic route faces the camera
    earthGroup.rotation.y = 0.52; // ~30° — centres Atlantic
    scene.add(earthGroup);

    /* ── Globe sphere ─────────────────────────────── */
    const globeUniforms = {
      dayTex:   { value: null },
      nightTex: { value: null },
      sunDir:   { value: new THREE.Vector3(1, 0, 0) },
    };
    const globeMat = new THREE.ShaderMaterial({
      uniforms: globeUniforms,
      vertexShader: DAY_NIGHT_VERT,
      fragmentShader: DAY_NIGHT_FRAG,
    });
    earthGroup.add(new THREE.Mesh(new THREE.SphereGeometry(1, 64, 64), globeMat));
    stateRef.current.globeUniforms = globeUniforms;

    const loader = new THREE.TextureLoader();
    loader.load('https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-day.jpg',
      tex => { globeUniforms.dayTex.value = tex; }, undefined, () => {});
    loader.load('https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-night.jpg',
      tex => { globeUniforms.nightTex.value = tex; }, undefined, () => {});

    /* ── Atmosphere glow ── */
    scene.add(new THREE.Mesh(
      new THREE.SphereGeometry(1.12, 32, 32),
      new THREE.MeshPhongMaterial({ color: 0x4488cc, transparent: true, opacity: 0.10, side: THREE.BackSide })
    ));

    /* ── Airport markers (inside earthGroup so they rotate with globe) ── */
    const dotMat  = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const ringMat = new THREE.MeshBasicMaterial({ color: 0x4da6ff, transparent: true, opacity: 0.55, side: THREE.DoubleSide });
    const seenCodes = new Set();
    MAP_FLIGHTS.forEach(fl => {
      [fl.from, fl.to].forEach(code => {
        if (seenCodes.has(code)) return;
        seenCodes.add(code);
        const apt = AIRPORTS_GEO[code];
        const pos = latLngToVec3(apt.lat, apt.lng, 1.012);
        const dot = new THREE.Mesh(new THREE.SphereGeometry(0.013, 8, 8), dotMat.clone());
        dot.position.copy(pos);
        earthGroup.add(dot);
        const ring = new THREE.Mesh(new THREE.RingGeometry(0.018, 0.030, 16), ringMat.clone());
        ring.position.copy(pos);
        ring.lookAt(new THREE.Vector3(0, 0, 0));
        earthGroup.add(ring);
      });
    });

    /* ── Flight arcs (inside earthGroup) ─────────── */
    MAP_FLIGHTS.forEach(fl => {
      const pts = buildArc(AIRPORTS_GEO[fl.from], AIRPORTS_GEO[fl.to], 90, 0.22);
      const geo  = new THREE.BufferGeometry().setFromPoints(pts);

      // Glow halo
      earthGroup.add(new THREE.Line(
        new THREE.BufferGeometry().setFromPoints(pts),
        new THREE.LineBasicMaterial({ color: new THREE.Color(fl.color), transparent: true, opacity: fl.status==='cancelled' ? 0.08 : 0.18 })
      ));
      // Main arc
      earthGroup.add(new THREE.Line(geo,
        new THREE.LineBasicMaterial({ color: new THREE.Color(fl.color), transparent: true, opacity: fl.status==='cancelled' ? 0.45 : 0.9 })
      ));
      // Animated sweep (non-cancelled only)
      if (fl.status !== 'cancelled') {
        const sweepGeo = new THREE.BufferGeometry().setFromPoints(pts.slice(0, 2));
        const sweep    = new THREE.Line(sweepGeo,
          new THREE.LineBasicMaterial({ color: new THREE.Color(fl.color) })
        );
        earthGroup.add(sweep);
        if (!stateRef.current.sweeps) stateRef.current.sweeps = [];
        stateRef.current.sweeps.push({ sweep, pts, prog: 0, speed: 0.004 });
      }
    });

    /* ── Drag-to-rotate + zoom ────────────────────── */
    let isDragging = false, prevX = 0, prevY = 0, pinchDist = 0;
    let autoSpin = true;
    const onDown = (e) => {
      if (e.touches && e.touches.length === 2) return;
      isDragging = true; autoSpin = false;
      prevX = e.clientX ?? e.touches?.[0]?.clientX ?? 0;
      prevY = e.clientY ?? e.touches?.[0]?.clientY ?? 0;
    };
    const onMove = (e) => {
      if (e.touches && e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const d  = Math.sqrt(dx*dx + dy*dy);
        if (pinchDist > 0) camera.position.z = Math.max(1.4, Math.min(6, camera.position.z - (d - pinchDist) * 0.012));
        pinchDist = d; return;
      }
      pinchDist = 0;
      if (!isDragging) return;
      const cx = e.clientX ?? e.touches?.[0]?.clientX ?? 0;
      const cy = e.clientY ?? e.touches?.[0]?.clientY ?? 0;
      earthGroup.rotation.y += (cx - prevX) * 0.006;
      earthGroup.rotation.x  = Math.max(-1.1, Math.min(1.1, earthGroup.rotation.x + (cy - prevY) * 0.004));
      prevX = cx; prevY = cy;
    };
    const onUp = () => { isDragging = false; pinchDist = 0; };
    const onWheel = (e) => { e.preventDefault(); camera.position.z = Math.max(1.4, Math.min(6, camera.position.z + e.deltaY * 0.004)); };

    renderer.domElement.addEventListener('mousedown',  onDown);
    renderer.domElement.addEventListener('touchstart', onDown, { passive: true });
    renderer.domElement.addEventListener('wheel',      onWheel, { passive: false });
    window.addEventListener('mousemove',  onMove);
    window.addEventListener('touchmove',  onMove, { passive: true });
    window.addEventListener('mouseup',    onUp);
    window.addEventListener('touchend',   onUp);

    /* ── Animation loop ───────────────────────────── */
    let animId;
    stateRef.current.earthGroup = earthGroup;

    const animate = () => {
      animId = requestAnimationFrame(animate);
      if (autoSpin) earthGroup.rotation.y += 0.0022;

      if (stateRef.current.globeUniforms) {
        stateRef.current.globeUniforms.sunDir.value.copy(calcSunDir(earthGroup));
      }

      (stateRef.current.sweeps || []).forEach(s => {
        s.prog = (s.prog + s.speed) % 1.1;
        const end = Math.min(Math.floor(s.prog * s.pts.length), s.pts.length - 1);
        const visible = s.pts.slice(0, Math.max(2, end));
        if (visible.length >= 2) {
          s.sweep.geometry.setFromPoints(visible);
          s.sweep.geometry.attributes.position.needsUpdate = true;
        }
      });

      renderer.render(scene, camera);
    };
    animate();

    Object.assign(stateRef.current, { renderer, camera });

    return () => {
      cancelAnimationFrame(animId);
      renderer.domElement.removeEventListener('mousedown',  onDown);
      renderer.domElement.removeEventListener('touchstart', onDown);
      renderer.domElement.removeEventListener('wheel',      onWheel);
      window.removeEventListener('mousemove',  onMove);
      window.removeEventListener('touchmove',  onMove);
      window.removeEventListener('mouseup',    onUp);
      window.removeEventListener('touchend',   onUp);
      if (el.contains(renderer.domElement)) el.removeChild(renderer.domElement);
      renderer.dispose();
      stateRef.current = {};
    };
  }, []);

  const fl = MAP_FLIGHTS[active];

  return (
    <div className="screen" style={{position:'relative', background:'#050510'}}>

      {/* Three.js mounts its canvas here */}
      <div ref={mountRef} style={{position:'absolute',inset:0,overflow:'hidden'}}/>

      {/* Top fade + title */}
      <div style={{position:'absolute',top:0,left:0,right:0,height:80,zIndex:10,
        background:'linear-gradient(to bottom,rgba(5,5,16,0.88),transparent)',pointerEvents:'none'}}/>
      <div style={{position:'absolute',top:14,left:0,right:0,zIndex:20,textAlign:'center',pointerEvents:'none'}}>
        <span style={{fontSize:15,fontWeight:700,color:'#fff',textShadow:'0 1px 10px rgba(0,0,0,0.9)'}}>Trip Map</span>
      </div>

      {/* Legend */}
      <div style={{position:'absolute',top:50,left:14,zIndex:100,
        background:'rgba(8,8,20,0.82)',border:'1px solid rgba(255,255,255,0.09)',
        borderRadius:10,padding:'8px 12px',backdropFilter:'blur(12px)'}}>
        {MAP_FLIGHTS.map((f,i)=>(
          <div key={f.id} style={{display:'flex',alignItems:'center',gap:8,marginBottom:i<MAP_FLIGHTS.length-1?5:0}}>
            <div style={{width:20,height:f.status==='cancelled'?1.5:2.5,background:f.color,
              opacity:f.status==='cancelled'?0.5:1,borderRadius:1}}/>
            <span style={{fontSize:11,fontWeight:600,color:f.status==='cancelled'?'#ff6b6b':'#b0b0c8'}}>
              {f.number}{f.status==='cancelled'?' · cancelled':''}
            </span>
          </div>
        ))}
      </div>

      {/* Hint */}
      <div style={{position:'absolute',bottom:260,left:0,right:0,zIndex:50,textAlign:'center',pointerEvents:'none'}}>
        <div style={{display:'inline-flex',alignItems:'center',gap:6,
          background:'rgba(10,10,20,0.65)',border:'1px solid rgba(255,255,255,0.07)',
          borderRadius:20,padding:'5px 13px',backdropFilter:'blur(8px)'}}>
          <span style={{fontSize:11,color:'rgba(255,255,255,0.4)'}}>Drag to rotate · Scroll to zoom</span>
        </div>
      </div>

      {/* Bottom card */}
      <div className="map-card">
        <div className="map-flight-tabs">
          {MAP_FLIGHTS.map((f,i)=>(
            <div key={f.id} className={`map-flight-tab ${active===i?'active-tab':'inactive-tab'}`}
              onClick={()=>setActive(i)}>
              <div style={{fontSize:12,fontWeight:700,color:active===i?f.color:'#5a5a72'}}>{f.number}</div>
              <div style={{fontSize:10,color:'#3a3a52',marginTop:2}}>{f.from} → {f.to}</div>
            </div>
          ))}
        </div>
        <div className="map-card-inner">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
            <div>
              <div style={{fontSize:11,color:'#5a5a72',marginBottom:3,textTransform:'uppercase',letterSpacing:'0.5px'}}>
                {fl.airline} · {fl.date}
              </div>
              <div style={{fontSize:17,fontWeight:700,color:'#fff'}}>{fl.number}</div>
            </div>
            <FlightStatusBadge status={fl.status}/>
          </div>
          <div style={{display:'flex',alignItems:'center',marginBottom:12}}>
            <div>
              <div style={{fontSize:26,fontWeight:800,color:'#fff'}}>{fl.from}</div>
              <div style={{fontSize:11,color:'#5a5a72'}}>{AIRPORTS_GEO[fl.from]?.city}</div>

/* ══════════════════════════════════════════════════════════
   APP SHELL
══════════════════════════════════════════════════════════ */
const App = () => {
  const [screen, setScreen] = useState("trips");
  const [tab, setTab]       = useState("trips");

  const navigate = (s) => {
    const tabScreens = ["trips","track","log","map"];
    if(tabScreens.includes(s)) { setTab(s); setScreen(s); }
    else setScreen(s);
  };

  const goBack = () => {
    const parentMap = { cancellation:"trips", lounges:"trips", compensation:"trips", esim:"trips" };
    navigate(parentMap[screen] || tab);
  };

  const renderScreen = () => {
    switch(screen) {
      case "trips":        return <TripsScreen onNavigate={navigate}/>;
      case "track":        return <TrackScreen onNavigate={navigate}/>;
      case "log":          return <LogScreen/>;
      case "map":          return <MapScreen onNavigate={navigate}/>;
      case "cancellation": return <CancellationScreen onBack={goBack} onNavigate={navigate}/>;
      case "lounges":      return <LoungesScreen onBack={goBack}/>;
      case "compensation": return <CompensationScreen onBack={goBack}/>;
      case "esim":         return <EsimScreen onBack={goBack}/>;
      default:             return <TripsScreen onNavigate={navigate}/>;
    }
  };

  const showTab = !["cancellation","lounges","compensation","esim"].includes(screen);

  return (
    <div className="device-shell">
      {renderScreen()}
      {showTab && <TabBar active={tab} onTab={navigate}/>}
    </div>
  );
};

ReactDOM.render(<App/>, document.getElementById("root"));
