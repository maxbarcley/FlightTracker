<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>FlightOS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; background:#0a0a0f; }
body { font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif; overflow:hidden; }

.device-shell {
  width:100%; height:100vh; height:100dvh; background:#0a0a0f;
  overflow:hidden; position:relative; display:flex; flex-direction:column;
  padding-top:env(safe-area-inset-top);
}

.screen { flex:1; overflow:hidden; position:relative; display:flex; flex-direction:column; }
.nav-bar { padding:0 20px 12px; display:flex; align-items:center; min-height:52px; flex-shrink:0; z-index:10; }
.nav-back { color:#4da6ff; font-size:15px; cursor:pointer; padding:8px 0; }
.nav-title { flex:1; text-align:center; font-size:17px; font-weight:600; color:#fff; }
.nav-action { color:#4da6ff; font-size:14px; cursor:pointer; }

.scroll { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; }
.scroll::-webkit-scrollbar { display:none; }

.tab-bar {
  background:rgba(8,8,18,0.98); border-top:1px solid rgba(255,255,255,0.08);
  display:flex; align-items:center; padding:0 0 env(safe-area-inset-bottom); flex-shrink:0; backdrop-filter:blur(20px); z-index:50;
}
.tab { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; padding:10px 0 6px; }
.tab-icon { width:24px; height:24px; }
.tab-label { font-size:10px; font-weight:500; }
.tab.active .tab-label { color:#4da6ff; }
.tab.inactive .tab-label { color:#48485a; }

/* ── CARDS ── */
.card { background:#141420; border-radius:20px; border:1px solid rgba(255,255,255,0.07); margin:0 16px 12px; overflow:hidden; }
.card-body { padding:16px 18px; }

.badge { display:inline-flex; align-items:center; gap:4px; padding:4px 10px; border-radius:20px; font-size:11px; font-weight:700; }
.badge-red    { background:rgba(255,75,75,0.15);    color:#ff6b6b; }
.badge-green  { background:rgba(52,211,153,0.15);   color:#34d399; }
.badge-orange { background:rgba(251,146,60,0.15);   color:#fb923c; }
.badge-blue   { background:rgba(77,166,255,0.15);   color:#4da6ff; }
.badge-purple { background:rgba(167,139,250,0.15);  color:#a78bfa; }
.badge-gray   { background:rgba(255,255,255,0.08);  color:#8a8aa2; }

.divider { height:1px; background:rgba(255,255,255,0.06); margin:0 18px; }

.btn-primary  { background:#4da6ff; color:#fff; border:none; border-radius:14px; padding:16px; font-size:16px; font-weight:600; width:100%; cursor:pointer; }
.btn-ghost    { background:rgba(255,255,255,0.06); color:#fff; border:1px solid rgba(255,255,255,0.1); border-radius:14px; padding:14px; font-size:15px; font-weight:600; width:100%; cursor:pointer; }
.btn-secondary{ background:rgba(77,166,255,0.12); color:#4da6ff; border:1px solid rgba(77,166,255,0.25); border-radius:14px; padding:12px; font-size:14px; font-weight:600; cursor:pointer; }

.alert-banner { margin:0 16px 12px; border-radius:16px; padding:14px 16px; display:flex; gap:12px; align-items:flex-start; }
.alert-banner.red    { background:rgba(255,75,75,0.12);   border:1px solid rgba(255,75,75,0.2); }
.alert-banner.orange { background:rgba(251,146,60,0.12);  border:1px solid rgba(251,146,60,0.2); }
.alert-banner.purple { background:rgba(167,139,250,0.1);  border:1px solid rgba(167,139,250,0.2); }
.alert-banner.green  { background:rgba(52,211,153,0.08);  border:1px solid rgba(52,211,153,0.2); }
.alert-icon  { font-size:20px; flex-shrink:0; }
.alert-title { font-size:14px; font-weight:700; }
.alert-body  { font-size:12px; color:#8a8aa2; margin-top:3px; line-height:1.5; }

.modal-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.75); display:flex; align-items:flex-end; z-index:300; backdrop-filter:blur(4px); }
.modal-sheet   { background:#141420; border-radius:24px 24px 0 0; border:1px solid rgba(255,255,255,0.08); padding:12px 20px 40px; width:100%; max-height:80%; overflow-y:auto; }
.modal-handle  { width:36px; height:4px; background:#2a2a3a; border-radius:2px; margin:0 auto 20px; }

.route-code { font-size:36px; font-weight:800; color:#fff; letter-spacing:-1px; }
.amount-glow { font-size:52px; font-weight:800; color:#34d399; text-align:center; padding:8px 0; text-shadow:0 0 40px rgba(52,211,153,0.4); }
.input-field { background:#1e1e30; border:1px solid rgba(255,255,255,0.08); border-radius:12px; padding:14px 16px; color:#fff; font-size:15px; width:100%; outline:none; margin-bottom:10px; }

.comp-step { display:flex; gap:14px; margin-bottom:20px; }
.step-num    { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; flex-shrink:0; margin-top:2px; }
.step-active { background:#4da6ff; color:#fff; }
.step-done   { background:#34d399; color:#fff; }
.step-pending{ background:#1e1e30; color:#5a5a72; border:1px solid #2a2a3a; }
.step-content { flex:1; }
.step-title  { font-size:14px; font-weight:600; color:#fff; }
.step-desc   { font-size:12px; color:#5a5a72; margin-top:3px; line-height:1.5; }

.slide-in { animation:slideIn 0.28s cubic-bezier(0.25,0.46,0.45,0.94) both; }
@keyframes slideIn { from { transform:translateX(30px); opacity:0; } to { transform:translateX(0); opacity:1; } }

/* ── SEARCH BAR ── */
.search-bar {
  margin:0 16px; background:#1a1a2c; border-radius:14px;
  border:1px solid rgba(255,255,255,0.08); display:flex; align-items:center;
  gap:10px; padding:12px 16px; cursor:text;
}
.search-bar input { flex:1; background:none; border:none; outline:none; color:#fff; font-size:15px; font-family:inherit; }
.search-bar input::placeholder { color:#3a3a52; }
.search-icon { font-size:16px; color:#3a3a52; flex-shrink:0; }

/* ── SEGMENTED CONTROL ── */
.seg-ctrl { display:flex; background:#141420; border-radius:12px; padding:3px; margin:12px 16px 0; border:1px solid rgba(255,255,255,0.06); }
.seg-btn  { flex:1; border:none; border-radius:10px; padding:8px; font-size:13px; font-weight:600; cursor:pointer; transition:all 0.2s; }
.seg-btn.active   { background:#4da6ff; color:#fff; }
.seg-btn.inactive { background:transparent; color:#5a5a72; }

/* ── FIDS BOARD ── */
.fids-row { display:flex; align-items:center; padding:11px 16px; border-bottom:1px solid rgba(255,255,255,0.04); cursor:pointer; }
.fids-row:active { background:rgba(255,255,255,0.03); }
.fids-time { font-size:15px; font-weight:700; color:#fff; width:46px; flex-shrink:0; }
.fids-num  { font-size:13px; font-weight:600; color:#8a8aa2; width:62px; flex-shrink:0; }
.fids-dest { flex:1; font-size:14px; font-weight:500; color:#fff; }
.fids-gate { font-size:12px; color:#5a5a72; width:36px; text-align:right; flex-shrink:0; }
.fids-status { width:76px; text-align:right; flex-shrink:0; }

/* ── LIVE FLIGHT ── */
.live-badge { display:flex; align-items:center; gap:5px; font-size:12px; font-weight:700; color:#34d399; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.live-dot { width:7px; height:7px; border-radius:50%; background:#34d399; animation:blink 1.4s ease-in-out infinite; }

/* ── FLIGHT PROGRESS BAR ── */
.fp-track { height:4px; background:#1e1e30; border-radius:2px; position:relative; margin:10px 0 4px; }
.fp-fill  { height:100%; border-radius:2px; position:absolute; left:0; top:0; }
.fp-plane { position:absolute; top:50%; transform:translate(-50%,-50%); font-size:13px; }

/* ── TIMELINE ── */
.timeline { display:flex; justify-content:space-between; align-items:flex-start; padding:0 4px; position:relative; margin:8px 0 4px; }
.timeline::before { content:''; position:absolute; top:11px; left:10%; right:10%; height:1px; background:rgba(255,255,255,0.08); }
.tl-node { display:flex; flex-direction:column; align-items:center; gap:4px; z-index:1; }
.tl-dot  { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.tl-dot-done { background:#34d399; box-shadow:0 0 8px rgba(52,211,153,0.5); }
.tl-dot-active { background:#4da6ff; box-shadow:0 0 8px rgba(77,166,255,0.6); animation:blink 1.4s ease-in-out infinite; }
.tl-dot-pending { background:#1e1e30; border:1px solid #2a2a3a; }
.tl-label { font-size:9px; color:#5a5a72; font-weight:600; text-align:center; max-width:52px; line-height:1.3; }
.tl-time  { font-size:9px; color:#3a3a52; }

/* ── LOG / STATS ── */
.year-bar-track { height:12px; background:#1e1e30; border-radius:6px; flex:1; overflow:hidden; }
.year-bar-fill  { height:100%; border-radius:6px; }

.log-flight-row { display:flex; align-items:center; gap:12px; padding:12px 16px; border-bottom:1px solid rgba(255,255,255,0.04); cursor:pointer; }
.log-flight-row:active { background:rgba(255,255,255,0.03); }

/* ── RISK SCORE ── */
.risk-arc-wrap { display:flex; flex-direction:column; align-items:center; padding:12px 0 8px; }
.risk-score-num { font-size:56px; font-weight:800; letter-spacing:-2px; }
.risk-factor { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.05); }
.risk-bar-wrap { width:80px; height:6px; background:#1e1e30; border-radius:3px; overflow:hidden; }
.risk-bar-fill { height:100%; border-radius:3px; }

/* ── MAP / GLOBE ── */
.globe-wrap { position:absolute; inset:0; overflow:hidden; background:#050510; }
.globe-wrap canvas { display:block; }
.map-card { position:absolute; bottom:0; left:0; right:0; z-index:100; background:linear-gradient(to top, rgba(5,5,16,0.99) 65%, transparent); padding:0 16px 16px; }
.map-card-inner { background:rgba(14,14,28,0.96); border-radius:20px; border:1px solid rgba(255,255,255,0.09); padding:14px 16px; backdrop-filter:blur(20px); }
.map-flight-tabs { display:flex; gap:8px; margin-bottom:10px; }
.map-flight-tab  { flex:1; border-radius:10px; padding:8px 10px; cursor:pointer; border:1px solid transparent; text-align:center; transition:all 0.2s; }
.map-flight-tab.active-tab   { background:rgba(77,166,255,0.12); border-color:rgba(77,166,255,0.35); }
.map-flight-tab.inactive-tab { background:rgba(255,255,255,0.04); border-color:rgba(255,255,255,0.07); }

/* lounge / alt / esim */
.lounge-card { background:#1a1a2a; border-radius:16px; border:1px solid rgba(255,255,255,0.07); margin-bottom:10px; overflow:hidden; }
.lounge-header { padding:14px 16px; display:flex; gap:12px; align-items:center; }
.lounge-logo { width:44px; height:44px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
.lounge-footer { padding:0 16px 14px; }
.alt-card { background:#1a1a2a; border-radius:16px; border:1px solid rgba(255,255,255,0.07); margin-bottom:10px; padding:14px 16px; cursor:pointer; }
.alt-card.selected { border-color:#4da6ff; background:rgba(77,166,255,0.06); }
.esim-card { background:#1a1a2a; border-radius:16px; border:1px solid rgba(255,255,255,0.07); margin-bottom:10px; padding:16px; display:flex; align-items:center; gap:14px; cursor:pointer; }
</style>
</head>

/* ══════════════════════════════════════════════════════════
   UTILS
══════════════════════════════════════════════════════════ */
function greatCircle(fromKey, toKey, steps=80) {
  const a=AIRPORTS_GEO[fromKey], b=AIRPORTS_GEO[toKey];
  if(!a||!b) return [];
  const r=d=>d*Math.PI/180, d2=r=>r*180/Math.PI;
  const [la1,lo1,la2,lo2]=[r(a.lat),r(a.lng),r(b.lat),r(b.lng)];
  const D=2*Math.asin(Math.sqrt(Math.pow(Math.sin((la2-la1)/2),2)+Math.cos(la1)*Math.cos(la2)*Math.pow(Math.sin((lo2-lo1)/2),2)));
  if(D===0) return [[a.lat,a.lng]];
  return Array.from({length:steps+1},(_,i)=>{
    const f=i/steps,A=Math.sin((1-f)*D)/Math.sin(D),B=Math.sin(f*D)/Math.sin(D);
    const x=A*Math.cos(la1)*Math.cos(lo1)+B*Math.cos(la2)*Math.cos(lo2);
    const y=A*Math.cos(la1)*Math.sin(lo1)+B*Math.cos(la2)*Math.sin(lo2);
    const z=A*Math.sin(la1)+B*Math.sin(la2);
    return [d2(Math.atan2(z,Math.sqrt(x*x+y*y))),d2(Math.atan2(y,x))];
  });
}
function numFmt(n) { return Number(n).toLocaleString(); }

/* ══════════════════════════════════════════════════════════
   MINI GLOBE (Trips home screen)
══════════════════════════════════════════════════════════ */
const MiniGlobe = ({ flights }) => {
  const mountRef = useRef(null);
  const stateRef = useRef({});

  useEffect(() => {
    const el = mountRef.current;
    if (!el || stateRef.current.renderer) return;
    const W = el.clientWidth || 393;
    const H = 220;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(W, H);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x050510, 1);
    renderer.domElement.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;display:block;';
    el.appendChild(renderer.domElement);

    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, W / H, 0.1, 100);
    camera.position.set(0, 0, 2.6);
    camera.lookAt(0, 0, 0);

    scene.add(new THREE.AmbientLight(0x334466, 2.2));
    const sun = new THREE.DirectionalLight(0xffffff, 1.0);
    sun.position.set(5, 3, 5);
    scene.add(sun);

    const earthGroup = new THREE.Group();
    earthGroup.rotation.y = 0.52;
    scene.add(earthGroup);

    const globeGeo = new THREE.SphereGeometry(1, 48, 48);
    const globeMat = new THREE.MeshPhongMaterial({ color: 0x1a3055, shininess: 8, specular: new THREE.Color(0x112244) });
    earthGroup.add(new THREE.Mesh(globeGeo, globeMat));
    new THREE.TextureLoader().load(
      'https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-night.jpg',
      (tex) => { globeMat.map = tex; globeMat.color.set(0xffffff); globeMat.needsUpdate = true; },
      undefined, () => {}
    );
    scene.add(new THREE.Mesh(
      new THREE.SphereGeometry(1.08, 32, 32),
      new THREE.MeshPhongMaterial({ color: 0x4488cc, transparent: true, opacity: 0.08, side: THREE.BackSide })
    ));

    const dotMat  = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const ringMat = new THREE.MeshBasicMaterial({ color: 0x4da6ff, transparent: true, opacity: 0.55, side: THREE.DoubleSide });
    const seenCodes = new Set();
    flights.forEach(fl => {
      [fl.from, fl.to].forEach(code => {
        if (seenCodes.has(code) || !AIRPORTS_GEO[code]) return;
        seenCodes.add(code);
        const pos = latLngToVec3(AIRPORTS_GEO[code].lat, AIRPORTS_GEO[code].lng, 1.012);
        const dot = new THREE.Mesh(new THREE.SphereGeometry(0.013, 8, 8), dotMat.clone());
        dot.position.copy(pos); earthGroup.add(dot);
        const ring = new THREE.Mesh(new THREE.RingGeometry(0.018, 0.030, 16), ringMat.clone());
        ring.position.copy(pos); ring.lookAt(new THREE.Vector3(0,0,0)); earthGroup.add(ring);
      });
    });

    stateRef.current.sweeps = [];
    flights.forEach(fl => {
      const a = AIRPORTS_GEO[fl.from], b = AIRPORTS_GEO[fl.to];
      if (!a || !b) return;
      const pts = buildArc(a, b, 90, 0.22);
      earthGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
        new THREE.LineBasicMaterial({ color: new THREE.Color(fl.color), transparent: true, opacity: fl.status==='cancelled' ? 0.08 : 0.18 })));
      earthGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
        new THREE.LineBasicMaterial({ color: new THREE.Color(fl.color), transparent: true, opacity: fl.status==='cancelled' ? 0.45 : 0.9 })));
      if (fl.status !== 'cancelled') {
        const sweepGeo = new THREE.BufferGeometry().setFromPoints(pts.slice(0, 2));
        const sweep = new THREE.Line(sweepGeo, new THREE.LineBasicMaterial({ color: new THREE.Color(fl.color) }));
        earthGroup.add(sweep);
        stateRef.current.sweeps.push({ sweep, pts, prog: Math.random(), speed: 0.004 });
      }
    });

    let isDragging = false, prevX = 0;
    stateRef.current.autoSpin = true;
    const onDown = (e) => { isDragging = true; stateRef.current.autoSpin = false; prevX = e.clientX || e.touches?.[0]?.clientX || 0; };
    const onMove = (e) => { if (!isDragging) return; const cx = e.clientX || e.touches?.[0]?.clientX || 0; earthGroup.rotation.y += (cx - prevX) * 0.008; prevX = cx; };
    const onUp = () => { isDragging = false; };
    renderer.domElement.addEventListener('mousedown', onDown);
    renderer.domElement.addEventListener('touchstart', onDown, { passive: true });
    window.addEventListener('mousemove', onMove);
    window.addEventListener('touchmove', onMove, { passive: true });
    window.addEventListener('mouseup', onUp);
    window.addEventListener('touchend', onUp);

    let animId;
    const animate = () => {
      animId = requestAnimationFrame(animate);
      if (stateRef.current.autoSpin) earthGroup.rotation.y += 0.0022;
      (stateRef.current.sweeps || []).forEach(s => {
        s.prog = (s.prog + s.speed) % 1.1;
        const end = Math.min(Math.floor(s.prog * s.pts.length), s.pts.length - 1);
        const visible = s.pts.slice(0, Math.max(2, end));
        if (visible.length >= 2) { s.sweep.geometry.setFromPoints(visible); s.sweep.geometry.attributes.position.needsUpdate = true; }
      });
      renderer.render(scene, camera);
    };
    animate();

    return () => {
      cancelAnimationFrame(animId);
      renderer.domElement.removeEventListener('mousedown', onDown);
      renderer.domElement.removeEventListener('touchstart', onDown);
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('touchmove', onMove);
      window.removeEventListener('mouseup', onUp);
      window.removeEventListener('touchend', onUp);
      if (el.contains(renderer.domElement)) el.removeChild(renderer.domElement);
      renderer.dispose();
      stateRef.current = {};
    };
  }, []);

  return <div ref={mountRef} style={{position:'relative',width:'100%',height:220,overflow:'hidden',flexShrink:0}}/>;
};

/* ══════════════════════════════════════════════════════════
   ADD FLIGHT MODAL
══════════════════════════════════════════════════════════ */
const AddFlightModal = ({ onClose, onAdd }) => {
  const [query,   setQuery]   = useState("");
  const [date,    setDate]    = useState("");
  const [loading, setLoading] = useState(false);
  const [result,  setResult]  = useState(null);
  const [error,   setError]   = useState(null);

  const search = async () => {
    const callsign = query.replace(/\s/g, '').toUpperCase();
    if (!callsign) return;
    setLoading(true); setError(null); setResult(null);
    try {
      const res  = await fetch(`https://opensky-network.org/api/states/all?callsign=${callsign}`);
      const data = await res.json();
      if (data.states && data.states.length > 0) {
        const s = data.states[0];
        setResult({
          number:   (s[1] || '').trim(),
          country:  s[2],
          lat:      s[6],
          lng:      s[5],
          altitude: s[7] ? Math.round(s[7] * 3.281) : null,
          speed:    s[9] ? Math.round(s[9] * 1.944) : null,
          onGround: s[8],
        });
      } else {
        setError("Not currently in live traffic. You can still add it manually.");
      }
    } catch(e) {
      setError("Couldn't reach live data. You can still add manually.");
    }
    setLoading(false);
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-sheet" onClick={e => e.stopPropagation()}>
        <div className="modal-handle"/>
        <div style={{fontSize:18, fontWeight:700, color:"#fff", marginBottom:16}}>Add Flight</div>
        <div style={{display:"flex", gap:8, marginBottom:10}}>
          <input className="input-field" style={{margin:0, flex:1}} placeholder="Flight number (e.g. LH 441)"
            value={query} onChange={e => setQuery(e.target.value)}
            onKeyDown={e => e.key==='Enter' && search()}/>
          <button className="btn-secondary" style={{flexShrink:0, borderRadius:12, padding:"0 16px", cursor:"pointer"}}
            onClick={search} disabled={!query || loading}>{loading ? "…" : "Search"}</button>
        </div>
        <input className="input-field" type="date" value={date} onChange={e => setDate(e.target.value)} style={{marginBottom:14}}/>

        {error && <div style={{color:"#fb923c", fontSize:13, marginBottom:12, lineHeight:1.5}}>{error}</div>}

        {result && (
          <div style={{background:"rgba(77,166,255,0.08)", border:"1px solid rgba(77,166,255,0.2)", borderRadius:14, padding:16, marginBottom:12}}>
            <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8}}>
              <div style={{fontSize:17, fontWeight:700, color:"#fff"}}>{result.number}</div>
              <div className="live-badge"><div className="live-dot"/><span>LIVE</span></div>
            </div>
            <div style={{fontSize:13, color:"#8a8aa2"}}>
              {result.onGround ? "On ground" : `${result.altitude ? result.altitude.toLocaleString()+" ft" : "—"} · ${result.speed ? result.speed+" kts" : "—"}`}
            </div>
            <button className="btn-primary" style={{marginTop:14}}
              onClick={() => { onAdd({ number: result.number, date: date || "Today", live: true }); onClose(); }}>
              Add to My Trips
            </button>
          </div>
        )}

        <button className="btn-ghost" onClick={() => { if(query) { onAdd({ number: query.toUpperCase(), date: date || "Upcoming" }); onClose(); } }}
          disabled={!query} style={{opacity: query ? 1 : 0.4}}>
          Add manually
        </button>
      </div>
    </div>
  );
};

const TrackScreen = ({ onNavigate }) => {
  const [query, setQuery]       = useState("");
  const [mode, setMode]         = useState("flights");
  const [searching, setSearching] = useState(false);

  const [boardTab, setBoardTab] = useState("dep");

  const handleSearch = (suggestion) => {
    setQuery(suggestion.label);
    setSearching(false);
    if (suggestion.type === "flight") {
      setSelectedFlight(suggestion.label);
      setShowResult("flight");
    } else {
      setShowResult("airport");
    }
  };

  const filteredSuggestions = SEARCH_SUGGESTIONS.filter(s =>

  // ── Airport board ──────────────────────────────────────

          {board.map((f,i)=>(
            <div key={i} className="fids-row" onClick={()=>{setSelectedFlight(f.num);setShowResult("flight");}}>

            </div>
          ))}
          <div style={{height:20}}/>
        </div>
      </div>
    );

  // ── Live flight detail ─────────────────────────────────
  if (showResult === "flight") {
    const fn = selectedFlight || query;

    const isLive = d.alt !== null;

                    <div key={k} style={{flex:1,textAlign:"center"}}>
                      <div style={{fontSize:15,fontWeight:700,color:"#fff"}}>{v}</div>
                      <div style={{fontSize:10,color:"#5a5a72",marginTop:3}}>{k}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* Terminal info */}
          <div className="card">
            <div className="card-body">
              <div style={{fontSize:11,color:"#5a5a72",textTransform:"uppercase",letterSpacing:"0.6px",marginBottom:12}}>Terminal Info</div>
              <div style={{display:"flex"}}>
                {[["Terminal",d.terminal],["Gate",d.gate],["Aircraft",d.aircraft],["Tail",d.tail]].map(([k,v])=>(
                  <div key={k} style={{flex:1}}>

            </div>
            <div style={{fontSize:17,fontWeight:700,color:"#fff"}}>{d.co2}</div>
          </div>

          {/* Inbound */}

            <div style={{margin:"0 16px 12px",background:"rgba(77,166,255,0.06)",border:"1px solid rgba(77,166,255,0.15)",borderRadius:16,padding:"14px 16px",display:"flex",gap:12,alignItems:"center"}}>

          </div>
        </div>
      </div>
    );
  }

  // ── Main search view ───────────────────────────────────
  return (
    <div className="screen slide-in">
      <div style={{padding:"16px 20px 8px",fontSize:28,fontWeight:800,color:"#fff"}}>Track</div>

// Convert lat/lng to a point on a unit sphere (Three.js coords)
function latLngToVec3(lat, lng, r) {
  const phi   = (90 - lat) * Math.PI / 180;
  const theta = (lng + 180) * Math.PI / 180;
  return new THREE.Vector3(
    -r * Math.sin(phi) * Math.cos(theta),
     r * Math.cos(phi),
     r * Math.sin(phi) * Math.sin(theta)
  );
}

// Build arc points between two lat/lng pairs with a bow height
function buildArc(fromGeo, toGeo, segments, bowHeight) {
  const pts = [];
  for (let i = 0; i <= segments; i++) {
    const t   = i / segments;
    const lat = fromGeo.lat + (toGeo.lat - fromGeo.lat) * t;
    const lng = fromGeo.lng + (toGeo.lng - fromGeo.lng) * t;
    const h   = 1.0 + bowHeight * Math.sin(Math.PI * t);
    pts.push(latLngToVec3(lat, lng, h));
  }
  return pts;
}

const MapScreen = ({ onNavigate }) => {
  const mountRef = useRef(null);
  const stateRef = useRef({});
  const [active, setActive] = useState(0);

  // When tab changes, nudge the globe to face the route midpoint
  useEffect(() => {
    const eg = stateRef.current.earthGroup;
    if (!eg) return;
    const fl  = MAP_FLIGHTS[active];
    const a   = AIRPORTS_GEO[fl.from];
    const b   = AIRPORTS_GEO[fl.to];
    const midLng = (a.lng + b.lng) / 2;
    // Rotate so the midpoint faces the camera (camera is at +Z)
    // Three.js sphere: lng maps to -rotation.y offset
    eg.rotation.y = (-midLng * Math.PI / 180) + Math.PI;
    eg.rotation.x = (-(a.lat + b.lat) / 2) * Math.PI / 180 * 0.5;
  }, [active]);

  useEffect(() => {
    const el = mountRef.current;
    if (!el || stateRef.current.renderer) return;

    // Device shell is 393×852; subtract status(54) + tabs(60) + home(34) = 704px screen height
    const W = 393;
    const H = 704;

    /* ── Renderer ─────────────────────────────────── */
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(W, H);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x050510, 1);
    // Style the canvas to fill the container
    renderer.domElement.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;display:block;';
    el.appendChild(renderer.domElement);

    /* ── Scene & camera ───────────────────────────── */
    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(42, W / H, 0.1, 100);
    camera.position.set(0, 0, 2.8);
    camera.lookAt(0, 0, 0);

    /* ── Lighting (in scene space, not group) ─────── */
    scene.add(new THREE.AmbientLight(0x334466, 2.2));
    const sun = new THREE.DirectionalLight(0xffffff, 1.0);
    sun.position.set(5, 3, 5);
    scene.add(sun);

    /* ── Rotating group: globe + arcs + markers ───── */
    // Everything inside rotates together so arcs stay on the surface
    const earthGroup = new THREE.Group();
    // Start oriented so transatlantic route faces the camera
    earthGroup.rotation.y = 0.52; // ~30° — centres Atlantic
    scene.add(earthGroup);

    /* ── Globe sphere ─────────────────────────────── */
    const globeGeo = new THREE.SphereGeometry(1, 64, 64);
    const globeMat = new THREE.MeshPhongMaterial({
      color:      0x1a3055,
      shininess:  8,
      specular:   new THREE.Color(0x112244),
    });
    const globe = new THREE.Mesh(globeGeo, globeMat);
    earthGroup.add(globe);

    // Load NASA night-lights texture (async — falls back to deep blue)
    new THREE.TextureLoader().load(
      'https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-night.jpg',
      (tex) => { globeMat.map = tex; globeMat.color.set(0xffffff); globeMat.needsUpdate = true; },
      undefined,
      () => {}
    );

    /* ── Atmosphere glow (in scene, not group — always faces camera) ── */
    const atmMat = new THREE.MeshPhongMaterial({
      color: 0x4488cc, transparent: true, opacity: 0.10, side: THREE.BackSide,
    });
    scene.add(new THREE.Mesh(new THREE.SphereGeometry(1.12, 32, 32), atmMat));

    /* ── Airport markers (inside earthGroup so they rotate with globe) ── */
    const dotMat  = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const ringMat = new THREE.MeshBasicMaterial({ color: 0x4da6ff, transparent: true, opacity: 0.55, side: THREE.DoubleSide });
    const seenCodes = new Set();
    MAP_FLIGHTS.forEach(fl => {
      [fl.from, fl.to].forEach(code => {
        if (seenCodes.has(code)) return;
        seenCodes.add(code);
        const apt = AIRPORTS_GEO[code];
        const pos = latLngToVec3(apt.lat, apt.lng, 1.012);
        const dot = new THREE.Mesh(new THREE.SphereGeometry(0.013, 8, 8), dotMat.clone());
        dot.position.copy(pos);
        earthGroup.add(dot);
        const ring = new THREE.Mesh(new THREE.RingGeometry(0.018, 0.030, 16), ringMat.clone());
        ring.position.copy(pos);
        ring.lookAt(new THREE.Vector3(0, 0, 0));
        earthGroup.add(ring);
      });
    });

    /* ── Flight arcs (inside earthGroup) ─────────── */
    MAP_FLIGHTS.forEach(fl => {
      const pts = buildArc(AIRPORTS_GEO[fl.from], AIRPORTS_GEO[fl.to], 90, 0.22);
      const geo  = new THREE.BufferGeometry().setFromPoints(pts);

      // Glow halo
      earthGroup.add(new THREE.Line(
        new THREE.BufferGeometry().setFromPoints(pts),
        new THREE.LineBasicMaterial({ color: new THREE.Color(fl.color), transparent: true, opacity: fl.status==='cancelled' ? 0.08 : 0.18 })
      ));
      // Main arc
      earthGroup.add(new THREE.Line(geo,
        new THREE.LineBasicMaterial({ color: new THREE.Color(fl.color), transparent: true, opacity: fl.status==='cancelled' ? 0.45 : 0.9 })
      ));
      // Animated sweep (non-cancelled only)
      if (fl.status !== 'cancelled') {
        const sweepGeo = new THREE.BufferGeometry().setFromPoints(pts.slice(0, 2));
        const sweep    = new THREE.Line(sweepGeo,
          new THREE.LineBasicMaterial({ color: new THREE.Color(fl.color) })
        );
        earthGroup.add(sweep);
        if (!stateRef.current.sweeps) stateRef.current.sweeps = [];
        stateRef.current.sweeps.push({ sweep, pts, prog: 0, speed: 0.004 });
      }
    });

    /* ── Drag-to-rotate ───────────────────────────── */
    let isDragging = false, prevX = 0, prevY = 0;
    let autoSpin = true;
    const onDown = (e) => {
      isDragging = true; autoSpin = false;
      prevX = e.clientX || e.touches?.[0]?.clientX || 0;
      prevY = e.clientY || e.touches?.[0]?.clientY || 0;
    };
    const onMove = (e) => {
      if (!isDragging) return;
      const cx = e.clientX || e.touches?.[0]?.clientX || 0;
      const cy = e.clientY || e.touches?.[0]?.clientY || 0;
      earthGroup.rotation.y += (cx - prevX) * 0.006;
      earthGroup.rotation.x  = Math.max(-1.1, Math.min(1.1, earthGroup.rotation.x + (cy - prevY) * 0.004));
      prevX = cx; prevY = cy;
    };
    const onUp = () => { isDragging = false; };
    renderer.domElement.addEventListener('mousedown',  onDown);
    renderer.domElement.addEventListener('touchstart', onDown, { passive: true });
    window.addEventListener('mousemove',  onMove);
    window.addEventListener('touchmove',  onMove, { passive: true });
    window.addEventListener('mouseup',    onUp);
    window.addEventListener('touchend',   onUp);

    /* ── Animation loop ───────────────────────────── */
    let animId;
    stateRef.current.earthGroup = earthGroup;

    const animate = () => {
      animId = requestAnimationFrame(animate);
      if (autoSpin) earthGroup.rotation.y += 0.0022;

      // Arc sweep animation
      (stateRef.current.sweeps || []).forEach(s => {
        s.prog = (s.prog + s.speed) % 1.1;
        const end = Math.min(Math.floor(s.prog * s.pts.length), s.pts.length - 1);
        const visible = s.pts.slice(0, Math.max(2, end));
        if (visible.length >= 2) {
          s.sweep.geometry.setFromPoints(visible);
          s.sweep.geometry.attributes.position.needsUpdate = true;
        }
      });

      renderer.render(scene, camera);
    };
    animate();

    Object.assign(stateRef.current, { renderer, camera });

    return () => {
      cancelAnimationFrame(animId);
      renderer.domElement.removeEventListener('mousedown',  onDown);
      renderer.domElement.removeEventListener('touchstart', onDown);
      window.removeEventListener('mousemove',  onMove);
      window.removeEventListener('touchmove',  onMove);
      window.removeEventListener('mouseup',    onUp);
      window.removeEventListener('touchend',   onUp);
      if (el.contains(renderer.domElement)) el.removeChild(renderer.domElement);
      renderer.dispose();
      stateRef.current = {};
    };
  }, []);

  const fl = MAP_FLIGHTS[active];

  return (
    <div className="screen" style={{position:'relative', background:'#050510'}}>

      {/* Three.js mounts its canvas here */}
      <div ref={mountRef} style={{position:'absolute',inset:0,overflow:'hidden'}}/>

      {/* Top fade + title */}
      <div style={{position:'absolute',top:0,left:0,right:0,height:80,zIndex:10,
        background:'linear-gradient(to bottom,rgba(5,5,16,0.88),transparent)',pointerEvents:'none'}}/>
      <div style={{position:'absolute',top:14,left:0,right:0,zIndex:20,textAlign:'center',pointerEvents:'none'}}>
        <span style={{fontSize:15,fontWeight:700,color:'#fff',textShadow:'0 1px 10px rgba(0,0,0,0.9)'}}>Trip Map</span>
      </div>

      {/* Legend */}
      <div style={{position:'absolute',top:50,left:14,zIndex:100,
        background:'rgba(8,8,20,0.82)',border:'1px solid rgba(255,255,255,0.09)',
        borderRadius:10,padding:'8px 12px',backdropFilter:'blur(12px)'}}>
        {MAP_FLIGHTS.map((f,i)=>(
          <div key={f.id} style={{display:'flex',alignItems:'center',gap:8,marginBottom:i<MAP_FLIGHTS.length-1?5:0}}>
            <div style={{width:20,height:f.status==='cancelled'?1.5:2.5,background:f.color,
              opacity:f.status==='cancelled'?0.5:1,borderRadius:1}}/>
            <span style={{fontSize:11,fontWeight:600,color:f.status==='cancelled'?'#ff6b6b':'#b0b0c8'}}>
              {f.number}{f.status==='cancelled'?' · cancelled':''}
            </span>
          </div>
        ))}
      </div>

      {/* Hint */}
      <div style={{position:'absolute',bottom:260,left:0,right:0,zIndex:50,textAlign:'center',pointerEvents:'none'}}>
        <div style={{display:'inline-flex',alignItems:'center',gap:6,
          background:'rgba(10,10,20,0.65)',border:'1px solid rgba(255,255,255,0.07)',
          borderRadius:20,padding:'5px 13px',backdropFilter:'blur(8px)'}}>
          <span style={{fontSize:11,color:'rgba(255,255,255,0.4)'}}>Drag to rotate · Scroll to zoom</span>
        </div>
      </div>

      {/* Bottom card */}
      <div className="map-card">
        <div className="map-flight-tabs">
          {MAP_FLIGHTS.map((f,i)=>(
            <div key={f.id} className={`map-flight-tab ${active===i?'active-tab':'inactive-tab'}`}
              onClick={()=>setActive(i)}>
              <div style={{fontSize:12,fontWeight:700,color:active===i?f.color:'#5a5a72'}}>{f.number}</div>
              <div style={{fontSize:10,color:'#3a3a52',marginTop:2}}>{f.from} → {f.to}</div>
            </div>
          ))}
        </div>
        <div className="map-card-inner">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
            <div>
              <div style={{fontSize:11,color:'#5a5a72',marginBottom:3,textTransform:'uppercase',letterSpacing:'0.5px'}}>
                {fl.airline} · {fl.date}
              </div>
              <div style={{fontSize:17,fontWeight:700,color:'#fff'}}>{fl.number}</div>
            </div>
            <FlightStatusBadge status={fl.status}/>
          </div>
          <div style={{display:'flex',alignItems:'center',marginBottom:12}}>
            <div>
              <div style={{fontSize:26,fontWeight:800,color:'#fff'}}>{fl.from}</div>
              <div style={{fontSize:11,color:'#5a5a72'}}>{AIRPORTS_GEO[fl.from]?.city}</div>
              <div style={{fontSize:13,fontWeight:600,color:'#fff',marginTop:2}}>{fl.dep}</div>
            </div>
            <div style={{flex:1,padding:'0 12px'}}>
              <div style={{fontSize:10,color:'#5a5a72',textAlign:'center',marginBottom:4}}>{fl.duration}</div>
              <FlightProgressBar progress={fl.progress} color={fl.color}/>
              <div style={{fontSize:10,color:'#5a5a72',textAlign:'center',marginTop:4}}>Nonstop</div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:26,fontWeight:800,color:'#fff'}}>{fl.to}</div>
              <div style={{fontSize:11,color:'#5a5a72'}}>{AIRPORTS_GEO[fl.to]?.city}</div>
              <div style={{fontSize:13,fontWeight:600,color:'#fff',marginTop:2}}>{fl.arr}</div>
            </div>
          </div>
          {fl.status==='cancelled'
            ? <button className="btn-primary"
                style={{padding:'12px',background:'linear-gradient(135deg,#ff4b4b,#ff6b6b)',fontSize:14}}
                onClick={()=>onNavigate('cancellation')}>Find alternative flights →</button>
            : <div style={{display:'flex',gap:8}}>
                <button className="btn-secondary" style={{flex:1,padding:'10px',fontSize:13}} onClick={()=>onNavigate('lounges')}>Lounges</button>
                <button className="btn-secondary" style={{flex:1,padding:'10px',fontSize:13}} onClick={()=>onNavigate('esim')}>eSIM</button>
              </div>
          }
        </div>
      </div>
    </div>
  );
};

            <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:"#fff"}}>3h 40m until LH 443 boards</div><div style={{fontSize:11,color:"#5a5a72"}}>Gate B22 · Opens 20:45</div></div>
          </div>
        </div>
        {lounges.map(l=>(
          <div key={l.id} className="lounge-card" style={{margin:"0 16px 10px"}}>
            <div className="lounge-header">
              <div className="lounge-logo" style={{background:l.bg}}><span style={{fontSize:20}}>{l.emoji}</span></div>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div style={{fontSize:14,fontWeight:700,color:"#fff",flex:1,paddingRight:8}}>{l.name}</div>
                  {l.access==="owned"?<span className="badge badge-green">Free</span>:<span className="badge badge-orange">Day pass</span>}
                </div>
                <div style={{fontSize:11,color:"#5a5a72",marginTop:3}}>{l.terminal}</div>
                <div style={{fontSize:11,color:l.access==="owned"?"#34d399":"#fb923c",marginTop:3,fontWeight:500}}>{l.access==="owned"?`Via ${l.reason}`:l.reason}</div>
              </div>
            </div>
            <div style={{padding:"0 16px 8px",display:"flex",gap:6,flexWrap:"wrap"}}>
              {l.hot.map(h=>(<span key={h} style={{fontSize:11,color:"#8a8aa2",background:"#1e1e30",padding:"3px 8px",borderRadius:6}}>{h}</span>))}
            </div>
            <div className="lounge-footer">
              {l.access==="owned"
                ?<button className="btn-secondary" style={{padding:"10px",width:"100%"}}>View lounge details →</button>
                :<button className="btn-primary" style={{padding:"10px",fontSize:14,width:"100%"}} onClick={()=>setModal(l)}>Buy day pass · $50</button>
              }
            </div>
          </div>
        ))}
        <div style={{height:20}}/>
      </div>
      {modal&&!purchased&&(
        <div className="modal-overlay" onClick={()=>setModal(null)}>
          <div className="modal-sheet" onClick={e=>e.stopPropagation()}>
            <div className="modal-handle"/>
            <div style={{fontSize:18,fontWeight:700,color:"#fff",marginBottom:4}}>Buy Day Pass</div>
            <div style={{fontSize:13,color:"#5a5a72",marginBottom:20}}>{modal.name} · Valid today only</div>
            <div style={{background:"#1e1e30",borderRadius:14,padding:"14px 16px",marginBottom:16}}>
              {[["Lounge access","Included"],["Food & drinks","Included"],["Shower","Included"],["Total","$50.00"]].map(([k,v],i)=>(
                <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:i<3?"1px solid rgba(255,255,255,0.04)":"none"}}>
                  <span style={{fontSize:14,color:i===3?"#fff":"#8a8aa2",fontWeight:i===3?700:400}}>{k}</span>
                  <span style={{fontSize:14,color:"#fff",fontWeight:500}}>{v}</span>
                </div>
              ))}
            </div>
            <button className="btn-primary" onClick={()=>{setPurchased(true);setModal(null);}}>Pay with Apple Pay · $50</button>
          </div>
        </div>
      )}
      {purchased&&(
        <div className="modal-overlay">
          <div className="modal-sheet">
            <div style={{textAlign:"center",padding:"20px 0 10px"}}>
              <div style={{fontSize:56,marginBottom:12}}>🎉</div>
              <div style={{fontSize:22,fontWeight:800,color:"#fff",marginBottom:8}}>Access confirmed!</div>
              <div style={{fontSize:14,color:"#5a5a72",lineHeight:1.6,marginBottom:24}}>Show QR code at the door</div>
              <div style={{background:"#fff",borderRadius:16,padding:16,width:148,margin:"0 auto 20px"}}>
                <div style={{width:116,height:116,background:"repeating-linear-gradient(45deg,#000 0px,#000 4px,#fff 4px,#fff 8px)",margin:"0 auto"}}/>
              </div>
              <button className="btn-ghost" onClick={()=>{setPurchased(false);onBack();}}>Done</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

const CompensationScreen=({onBack})=>{
  const[step,setStep]=useState(0);
  const[email,setEmail]=useState("max@example.com");
  const[submitted,setSubmitted]=useState(false);
  if(submitted) return(
    <div className="screen slide-in"><div className="scroll"><div style={{textAlign:"center",padding:"60px 32px 32px"}}>
      <div style={{fontSize:64,marginBottom:16}}>📨</div>
      <div style={{fontSize:26,fontWeight:800,color:"#fff",marginBottom:12}}>Claim submitted!</div>
      <div style={{fontSize:14,color:"#5a5a72",lineHeight:1.7,marginBottom:28}}>We've filed your EU261 claim with Lufthansa. Airlines have 14 days to respond.</div>
      <div style={{background:"#141420",borderRadius:20,border:"1px solid rgba(52,211,153,0.2)",padding:20,marginBottom:20}}>
        <div className="amount-glow">€600</div>
        <div style={{fontSize:12,color:"#5a5a72",textAlign:"center",marginTop:4}}>Maximum entitlement · EU261/2004</div>
      </div>
    </div></div>
    <div style={{padding:"0 16px 20px",flexShrink:0}}><button className="btn-ghost" onClick={onBack}>Back to trips</button></div></div>
  );
  return(
    <div className="screen slide-in">
      <div className="nav-bar"><span className="nav-back" onClick={onBack}>‹ Back</span><span className="nav-title">Compensation Claim</span></div>
      <div className="scroll">
        <div className="card"><div className="card-body" style={{textAlign:"center"}}>
          <div style={{fontSize:12,color:"#5a5a72",textTransform:"uppercase",letterSpacing:"0.6px",marginBottom:8}}>You may be owed</div>
          <div className="amount-glow">€600</div>
          <div style={{fontSize:13,color:"#5a5a72",marginTop:4}}>EU Regulation 261/2004 · LH 441 cancellation</div>
          <div style={{marginTop:12,display:"flex",justifyContent:"center",gap:8}}>
            <span className="badge badge-green">Eligible</span>
            <span className="badge badge-green">EU route</span>
          </div>
        </div></div>
        <div style={{padding:"0 20px 16px"}}>
          <div style={{fontSize:14,fontWeight:700,color:"#fff",marginBottom:16}}>Claim progress</div>
          {[
            {title:"Flight verified",      desc:"LH 441 · JFK→MUC cancelled 2h early",state:"done"},
            {title:"Eligibility confirmed", desc:"EU261 applies · EU carrier on EU route", state:"done"},
            {title:"Submit claim",          desc:"Filed directly with Lufthansa",          state:step>=2?"done":"active"},
            {title:"Airline response",      desc:"Expected within 14 days",                state:step>=2?"active":"pending"},
          ].map((s,i)=>(
            <div key={i} className="comp-step">
              <div className={`step-num step-${s.state}`}>{s.state==="done"?"✓":i+1}</div>
              <div className="step-content"><div className="step-title">{s.title}</div><div className="step-desc">{s.desc}</div></div>
            </div>
          ))}
        </div>
        {step<2&&<div style={{padding:"0 16px 8px"}}>
          <div style={{fontSize:13,color:"#5a5a72",marginBottom:8}}>Confirm your email for updates</div>
          <input className="input-field" value={email} onChange={e=>setEmail(e.target.value)}/>
        </div>}
        <div style={{height:20}}/>
      </div>
      <div style={{padding:"0 16px 20px",flexShrink:0}}>
        {step<2
          ?<button className="btn-primary" onClick={()=>setStep(2)}>Submit claim · No win, no fee</button>
          :<button className="btn-primary" onClick={()=>setSubmitted(true)}>Confirm & submit →</button>
        }
        <div style={{textAlign:"center",marginTop:10,fontSize:11,color:"#3a3a52"}}>25% commission only if you receive payment</div>
      </div>
    </div>
  );
};

const EsimScreen=({onBack})=>{
  const[sel,setSel]=useState(null);
  const[purchased,setPurchased]=useState(false);
  if(purchased) return(
    <div className="screen slide-in"><div className="scroll"><div style={{textAlign:"center",padding:"60px 32px 32px"}}>
      <div style={{fontSize:64,marginBottom:16}}>📶</div>
      <div style={{fontSize:26,fontWeight:800,color:"#fff",marginBottom:12}}>eSIM activated!</div>
      <div style={{fontSize:14,color:"#5a5a72",lineHeight:1.7,marginBottom:28}}>Auto-connects when you land at MUC.</div>
      <div style={{background:"#141420",borderRadius:20,border:"1px solid rgba(77,166,255,0.15)",padding:20,marginBottom:20}}>
        {[["Plan","10 GB · 30 days"],["Country","🇩🇪 Germany"],["Status","Active"],["Auto-connects","On landing at MUC"]].map(([k,v])=>(
          <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
            <span style={{fontSize:14,color:"#5a5a72"}}>{k}</span><span style={{fontSize:14,color:"#fff",fontWeight:500}}>{v}</span>
          </div>
        ))}
      </div>
    </div></div>
    <div style={{padding:"0 16px 20px",flexShrink:0}}><button className="btn-ghost" onClick={onBack}>Back to trips</button></div></div>
  );
  return(
    <div className="screen slide-in">
      <div className="nav-bar"><span className="nav-back" onClick={onBack}>‹ Back</span><span className="nav-title">eSIM · Data Plans</span></div>
      <div className="scroll">
        <div className="alert-banner purple"><span className="alert-icon">📶</span><div><div className="alert-title" style={{color:"#a78bfa"}}>Stay connected in Germany</div><div className="alert-body">Activates automatically when you land at MUC</div></div></div>
        <div style={{padding:"0 20px 8px",fontSize:11,fontWeight:700,color:"#3a3a52",textTransform:"uppercase",letterSpacing:"0.6px"}}>Recommended for your trip</div>
        <div style={{padding:"0 16px"}}>
          {esimPlans.map(p=>(
            <div key={p.id} className="esim-card" style={{border:sel===p.id?"1px solid #a78bfa":"1px solid rgba(255,255,255,0.07)",background:sel===p.id?"rgba(167,139,250,0.06)":"#1a1a2a"}} onClick={()=>setSel(p.id)}>
              <span style={{fontSize:30}}>{p.flag}</span>
              <div style={{flex:1}}><div style={{fontSize:15,fontWeight:700,color:"#fff"}}>{p.country}</div><div style={{fontSize:12,color:"#5a5a72",marginTop:2}}>{p.data} · {p.duration} · {p.provider}</div></div>
              <div style={{textAlign:"right"}}><div style={{fontSize:17,fontWeight:700,color:"#fff"}}>{p.price}</div>{sel===p.id&&<div style={{fontSize:14,color:"#a78bfa",marginTop:4}}>✓ Selected</div>}</div>
            </div>
          ))}
        </div>
        <div style={{height:20}}/>
      </div>
      <div style={{padding:"0 16px 20px",flexShrink:0}}>
        <button className="btn-primary" disabled={!sel} onClick={()=>sel&&setPurchased(true)} style={{opacity:sel?1:0.4,background:sel?"linear-gradient(135deg,#7c3aed,#a78bfa)":undefined}}>
          {sel?`Buy ${esimPlans.find(p=>p.id===sel)?.price} · Apple Pay`:"Select a plan"}
        </button>
      </div>
    </div>
  );
};

/* ══════════════════════════════════════════════════════════
   APP SHELL
══════════════════════════════════════════════════════════ */
const App = () => {
  const [screen, setScreen] = useState("trips");
  const [tab, setTab]       = useState("trips");

  const navigate = (s) => {
    const tabScreens = ["trips","track","log","map"];
    if(tabScreens.includes(s)) { setTab(s); setScreen(s); }
    else setScreen(s);
  };

  const goBack = () => {
    const parentMap = { cancellation:"trips", lounges:"trips", compensation:"trips", esim:"trips" };
    navigate(parentMap[screen] || tab);
  };

  const renderScreen = () => {
    switch(screen) {
      case "trips":        return <TripsScreen onNavigate={navigate}/>;
      case "track":        return <TrackScreen onNavigate={navigate}/>;
      case "log":          return <LogScreen/>;
      case "map":          return <MapScreen onNavigate={navigate}/>;
      case "cancellation": return <CancellationScreen onBack={goBack} onNavigate={navigate}/>;
      case "lounges":      return <LoungesScreen onBack={goBack}/>;
      case "compensation": return <CompensationScreen onBack={goBack}/>;
      case "esim":         return <EsimScreen onBack={goBack}/>;
      default:             return <TripsScreen onNavigate={navigate}/>;
    }
  };

  const showTab = !["cancellation","lounges","compensation","esim"].includes(screen);

  return (
    <div className="device-shell">
      {renderScreen()}
      {showTab && <TabBar active={tab} onTab={navigate}/>}
    </div>
  );
};

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
